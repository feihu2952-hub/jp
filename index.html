<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #F8F6F1; font-family: 'Noto Sans JP', 'PingFang SC', sans-serif; }
        ruby { ruby-position: over; }
        /* 经典打字机高亮聚焦动画 */
        .char-focused {
            border-bottom: 3px solid #1E3A5F;
            background-color: rgba(30, 58, 95, 0.08);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. 内置多难度文章库
        // ==========================================
        const SAMPLE_ARTICLES = [
          {
            id: "art_001",
            title: "桜の開花予想",
            level: "N3",
            category: "文化",
            duration: 2,
            translation: "今年的樱花开放时间预计会比往年更早。气象厅表示，由于春季气温持续偏高，各地公园的樱花树将提早迎来绽放，建议大家提早做好准备。",
            elements: [

              { text: "桜", kana: "さくら", isKanji: true, meaning: "樱花" },
              { text: "の", kana: "の", isKanji: false },
              { text: "開花", kana: "かいか", isKanji: true, meaning: "开花" },
              { text: "は", kana: "は", isKanji: false },
              { text: "平年", kana: "へいねん", isKanji: true, meaning: "往年" },
              { text: "より", kana: "より", isKanji: false },
              { text: "早い", kana: "はやい", isKanji: true, meaning: "早的" },
              { text: "予想", kana: "よそう", isKanji: true, meaning: "预测" },
              { text: "です", kana: "です", isKanji: false },
              { text: "。", kana: "。", isKanji: false },
              { text: "気象庁", kana: "きしょうちょう", isKanji: true, meaning: "气象厅" },
              { text: "に", kana: "に", isKanji: false },
              { text: "よると", kana: "よると", isKanji: false },
              { text: "春", kana: "はる", isKanji: true, meaning: "春天" },
              { text: "の", kana: "の", isKanji: false },
              { text: "気温", kana: "きおん", isKanji: true, meaning: "气温" },
              { text: "が", kana: "が", isKanji: false },
              { text: "高い", kana: "たかい", isKanji: true, meaning: "高的" },
              { text: "ため", kana: "ため", isKanji: false },
              { text: "、", kana: "、", isKanji: false },
              { text: "準備", kana: "じゅんび", isKanji: true, meaning: "准备" },
              { text: "が", kana: "が", isKanji: false },
              { text: "必要", kana: "ひつよう", isKanji: true, meaning: "必要" },
              { text: "です", kana: "です", isKanji: false },
              { text: "。", kana: "。", isKanji: false }
            ]
          },
          {
            id: "art_002",
            title: "日本の新しい技術",

            category: "科技",
            duration: 3,
            translation: "日本的研究团队成功开发出了一款新型的轻量化蓄电池。该技术不仅能大幅度延长续航时间，而且制造成本极低。",
            elements: [
              { text: "新しい", kana: "あたらしい", isKanji: true, meaning: "新的" },
              { text: "電池", kana: "でんち", isKanji: true, meaning: "电池" },
              { text: "の", kana: "の", isKanji: false },
              { text: "技術", kana: "ぎじゅつ", isKanji: true, meaning: "技术" },
              { text: "を", kana: "を", isKanji: false },
              { text: "開発", kana: "かいはつ", isKanji: true, meaning: "开发" },
              { text: "しました", kana: "しました", isKanji: false },
              { text: "。", kana: "。", isKanji: false },
              { text: "経済", kana: "けいざい", isKanji: true, meaning: "经济" },
              { text: "への", kana: "への", isKanji: false },
              { text: "影響", kana: "えいきょう", isKanji: true, meaning: "影响" },
              { text: "も", kana: "も", isKanji: false },
              { text: "大きい", kana: "おおきい", isKanji: true, meaning: "大的" },
              { text: "見込み", kana: "みこみ", isKanji: true, meaning: "预估" },
              { text: "です", kana: "です", isKanji: false },
              { text: "。", kana: "。", isKanji: false }
            ]
          },
          {
            id: "art_003",
            title: "いっしょに お茶を 飲みませんか",
            level: "N5",
            category: "生活",
            duration: 1,
            translation: "要不要一起喝杯茶呢？上周我从朋友那里得到了非常美味的茶。星期天如果有空的话，请一定来我家玩吧。",
            elements: [
              { text: "友達", kana: "ともだち", isKanji: true, meaning: "朋友" },
              { text: "に", kana: "に", isKanji: false },
              { text: "美味しい", kana: "おいしい", isKanji: true, meaning: "美味的" },
              { text: "お茶", kana: "おちゃ", isKanji: true, meaning: "茶" },
              { text: "补", kana: "を", isKanji: false },
              { text: "もらいました", kana: "もらいました", isKanji: false },
              { text: "。", kana: "。", isKanji: false },
              { text: "日曜日", kana: "にちようび", isKanji: true, meaning: "星期天" },
              { text: "に", kana: "に", isKanji: false },
              { text: "一緒", kana: "いっしょ", isKanji: true, meaning: "一起" },
              { text: "に", kana: "に", isKanji: false },
              { text: "飲みませんか", kana: "のみませんか", isKanji: true, meaning: "不喝吗" },
              { text: "。", kana: "。", isKanji: false }
            ]
          }
        ];

        const ROMAJI_MAP = {
          a: "あ", i: "い", u: "う", e: "え", o: "お",
          ka: "か", ki: "き", ku: "く", ke: "け", ko: "こ",
          sa: "さ", si: "し", su: "す", se: "せ", so: "そ", shi: "し",
          ta: "た", ti: "ち", tu: "つ", te: "て", to: "と", chi: "ち", tsu: "つ",
          na: "な", ni: "に", nu: "ぬ", ne: "ね", no: "之",
          ha: "は", hi: "ひ", fu: "ふ", he: "へ", ho: "ほ", hu: "ふ",
          ma: "ま", mi: "み", mu: "む", me: "め", mo: "も",
          ya: "や", yu: "ゆ", yo: "よ",
          ra: "ら", ri: "り", ru: "る", re: "れ", ro: "ろ",
          wa: "わ", wo: "を", nn: "ん", n: "ん",
          ga: "が", gi: "ぎ", gu: "ぐ", ge: "げ", go: "ご",
          za: "ざ", zi: "じ", zu: "ず", ze: "ぜ", zo: "ぞ", ji: "じ",
          da: "だ", di: "ぢ", du: "づ", de: "で", do: "ど",
          ba: "ば", bi: "び", bu: "ぶ", be: "べ", bo: "ぼ",
          pa: "ぱ", pi: "ぴ", pu: "ぷ", pe: "ぺ", po: "ぽ",
          kya: "きゃ", kyu: "きゅ", kyo: "きょ",
          sha: "しゃ", shu: "しゅ", sho: "しょ", sya: "しゃ", syu: "しゅ", syo: "しょ",
          cha: "ちゃ", chu: "ちゅ", cho: "ちょ", cya: "ちゃ", cyu: "ちゅ", cyo: "ちょ",
          nya: "にゃ", nyu: "にょ", nyo: "にょ",
          hya: "ひゃ", hyu: "ひゃ", hyo: "ひょ",
          mya: "みゃ", myu: "みゃ", myo: "みょ",
          rya: "りゃ", ryu: "りょ", ryo: "りょ",
          gya: "ぎゃ", gyu: "ぎゅ", gyo: "ぎょ",
          ja: "じゃ", ju: "じゅ", jo: "じょ", zya: "じゃ", zyu: "じゅ", zyo: "じょ",
          bya: "びゃ", byu: "びゅ", byo: "びょ",
          pya: "ぴゃ", pyu: "ぴゅ", pyo: "ぴょ"
        };

        function convertRomajiToKana(romaji) {
          let buffer = romaji.toLowerCase();
          let result = "";
          while (buffer.length > 0) {
            let matched = false;
            for (let len = Math.min(3, buffer.length); len > 0; len--) {
              const chunk = buffer.substring(0, len);
              if (ROMAJI_MAP[chunk]) {
                result += ROMAJI_MAP[chunk];
                buffer = buffer.substring(len);
                matched = true;
                break;
              }
            }
            if (!matched && buffer.length >= 2 && buffer[0] === buffer[1] && buffer[0] >= 'a' && buffer[0] <= 'z' && buffer[0] !== 'n') {
              result += "っ";
              buffer = buffer.substring(1);
              matched = true;
            }
            if (!matched) break;
          }
          return { kana: result, remainder: buffer };
        }

        // ==========================================
        // 2. 主程序组件
        // ==========================================
        function JapaneseTypingTrainer() {
          const [view, setView] = React.useState("practice");
          const [challengeMode, setChallengeMode] = React.useState(false);
          const [selectedLevel, setSelectedLevel] = React.useState("ALL");
          const [article, setArticle] = React.useState(SAMPLE_ARTICLES[0]);
          const [recentArticles, setRecentArticles] = React.useState([]);
          
          // 用户当前在可见输入框内打出来的所有实时真实假名拼接长串
          const [userTypedKanaStr, setUserTypedKanaStr] = React.useState("");
          // 暂存未转化为假名的罗马字原生字母缓存（例如输入了 's' 还未按 'a'）
          const [rawTextBuffer, setRawTextBuffer] = React.useState("");

          // 统计
          const [startTime, setStartTime] = React.useState(null);
          const [totalCorrectChars, setTotalCorrectChars] = React.useState(0);
          const [mistakeCount, setMistakeCount] = React.useState(0);
          const [wpm, setWpm] = React.useState(0);
          const [accuracy, setAccuracy] = React.useState(100);

          const [userData, setUserData] = React.useState({
            completedArticles: [], mistakeWords: [], streakDays: 1, totalChars: 0
          });

          // 扁平化展开全文的所有假名数组，用于精准的位置比对
          const fullArticleKanaArray = React.useMemo(() => {
            let arr = [];
            article.elements.forEach((el, elIdx) => {
              el.kana.split("").forEach((char, charIdx) => {
                arr.push({ char, elIdx, charIdx, isKanji: el.isKanji, text: el.text, meaning: el.meaning });
              });
            });
            return arr;
          }, [article]);

          React.useEffect(() => {
            const saved = localStorage.getItem("jp_typing_trainer_data");
            if (saved) {
              try { setUserData(JSON.parse(saved)); } catch (e) { console.error(e); }
            }
          }, []);

          const saveUserData = (newData) => {
            setUserData(newData);
            localStorage.setItem("jp_typing_trainer_data", JSON.stringify(newData));
          };

          // 实时的看板计时器
          React.useEffect(() => {
            if (!startTime || userTypedKanaStr.length === 0) return;
            const interval = setInterval(() => {
              const elapsedMinutes = (Date.now() - startTime) / 60000;
              if (elapsedMinutes > 0) {
                setWpm(Math.round((totalCorrectChars / 5) / elapsedMinutes));
              }
              const totalAttempts = totalCorrectChars + mistakeCount;
              setAccuracy(totalAttempts > 0 ? Math.round((totalCorrectChars / totalAttempts) * 100) : 100);
            }, 1000);
            return () => clearInterval(interval);
          }, [startTime, userTypedKanaStr, totalCorrectChars, mistakeCount]);

          const switchRandomArticle = (forcedLevel = selectedLevel) => {
            let pool = SAMPLE_ARTICLES;
            if (forcedLevel !== "ALL") { pool = SAMPLE_ARTICLES.filter(art => art.level === forcedLevel); }
            if (pool.length === 0) { pool = SAMPLE_ARTICLES; setSelectedLevel("ALL"); }
            const available = pool.filter(art => !recentArticles.includes(art.id));
            setArticle(available.length > 0 ? available[Math.floor(Math.random() * available.length)] : pool[Math.floor(Math.random() * pool.length)]);
            resetTrainer();
          };

          const handleLevelChange = (level) => {
            setSelectedLevel(level);
            switchRandomArticle(level);
          };

          const resetTrainer = () => {
            setUserTypedKanaStr("");
            setRawTextBuffer("");
            setStartTime(null);
            setTotalCorrectChars(0);
            setMistakeCount(0);
            setWpm(0);
            setAccuracy(100);
          };

          // 核心逻辑：双轨镜像字符串动态匹配系统
          const handleTextareaChange = (e) => {
            if (!startTime) setStartTime(Date.now());
            const currentInputValue = e.target.value;
            setRawTextBuffer(currentInputValue);

            // 转换当前的整体输入流
            const { kana, remainder } = convertRomajiToKana(currentInputValue);

            if (kana.length > 0) {
              const newTotalTypedStr = userTypedKanaStr + kana;
              setUserTypedKanaStr(newTotalTypedStr);
              setRawTextBuffer(remainder);

              // 检查新加入的这个假名是否正确
              const checkIdx = newTotalTypedStr.length - 1;
              const targetCharObj = fullArticleKanaArray[checkIdx];

              if (targetCharObj && kana === targetCharObj.char) {
                // 打对了！
                setTotalCorrectChars(prev => prev + 1);
                
                // 判断是否已经全部打完
                if (newTotalTypedStr.length >= fullArticleKanaArray.length) {
                  setTimeout(() => {
                    alert("🎉 完美通关！长文已全部镜像比对匹配成功！");
                    const completed = [...userData.completedArticles, article.id];
                    saveUserData({
                      ...userData,
                      completedArticles: completed,
                      totalChars: userData.totalChars + fullArticleKanaArray.length
                    });
                    switchRandomArticle(selectedLevel);
                  }, 200);
                }
              } else {
                // 打错了或顺序不一致！
                setMistakeCount(prev => prev + 1);
                if (targetCharObj && targetCharObj.isKanji) {
                  logMistake(targetCharObj.text, targetCharObj.char, targetCharObj.meaning || "暂无释义");
                }
              }
            }
          };

          const logMistake = (kanji, kana, meaning) => {
            const list = [...userData.mistakeWords];
            const existing = list.find(item => item.kanji === kanji);
            if (existing) {
              existing.count += 1;
            } else {
              list.push({ kanji, kana, meaning, count: 1, lastMistakeTime: Date.now(), level: article.level });
            }
            saveUserData({ ...userData, mistakeWords: list });
          };

          // 针对错词复习时重组文章结构
          const startMistakeReview = (word) => {
            setArticle({
              id: `review_${Date.now()}`,
              title: `错词重训: ${word.kanji}`,
              level: word.level, category: "自主", duration: 1,
              translation: `专项打破弱点汉字：【${word.kanji}】。`,
              elements: [
                { text: word.kanji, kana: word.kana, isKanji: true, meaning: word.meaning },
                { text: "の", kana: "の", isKanji: false },
                { text: "練習", kana: "れんしゅう", isKanji: true, meaning: "练习" }
              ]
            });
            setView("practice");
            resetTrainer();
          };

          // 辅助函数：计算当前全局渲染索引在扁平化数组中的精准匹配状态
          let globalCharCounter = 0;

          return (
            <div className="min-h-screen text-[#1E3A5F] font-sans antialiased">
              <header className="border-b border-[#E6E1D6] px-6 py-4 flex flex-wrap justify-between items-center max-w-5xl mx-auto gap-4">
                <div className="flex items-center space-x-3">
                  <span className="text-xl font-bold tracking-wide text-[#1E3A5F]">日本語縦横</span>
                  <span className="text-xs px-2 py-0.5 bg-blue-100 text-blue-800 rounded-full font-medium">下挂镜像输入版</span>
                </div>
                
                <div className="flex items-center bg-white border border-[#E6E1D6] rounded-lg p-1 space-x-1 text-xs">
                  <span className="text-[#5A6B84] px-2 font-medium">难度过滤:</span>
                  {["ALL", "N5", "N3", "N2"].map((lvl) => (
                    <button key={lvl} onClick={() => handleLevelChange(lvl)} className={`px-3 py-1 rounded transition-all ${selectedLevel === lvl ? "bg-[#1E3A5F] text-white font-bold" : "text-[#5A6B84] hover:bg-[#F8F6F1]"}`}>{lvl === "ALL" ? "全选" : lvl}</button>
                  ))}
                </div>

                <nav className="flex space-x-2">
                  <button onClick={() => setView("practice")} className={`px-4 py-1.5 text-sm rounded-md transition-all ${view === "practice" ? "bg-[#1E3A5F] text-white shadow-sm" : "text-[#5A6B84] hover:text-[#1E3A5F]"}`}>双轨打字</button>
                  <button onClick={() => setView("mistakes")} className={`px-4 py-1.5 text-sm rounded-md transition-all ${view === "mistakes" ? "bg-[#1E3A5F] text-white shadow-sm" : "text-[#5A6B84] hover:text-[#1E3A5F]"}`}>错词账本 ({userData.mistakeWords.length})</button>
                </nav>
              </header>

              <main className="max-w-4xl mx-auto px-4 py-8 md:py-12">
                {view === "practice" ? (
                  <div>
                    <div className="mb-6 flex flex-wrap items-center justify-between gap-4 border-b border-[#E6E1D6] pb-4">
                      <div>
                        <h1 className="text-2xl font-semibold tracking-tight text-[#1E3A5F] mb-1">{article.title}</h1>
                        <div className="flex items-center space-x-3 text-xs text-[#5A6B84]">
                          <span className="px-2 py-0.5 bg-[#1E3A5F]/5 rounded text-[#1E3A5F] font-bold">{article.level}</span>
                          <span>•</span><span>预计时间: {article.duration} 分钟</span>
                        </div>
                      </div>
                      <div className="flex items-center space-x-2">
                        <button onClick={() => setChallengeMode(!challengeMode)} className={`text-xs px-3 py-1.5 rounded border ${challengeMode ? "bg-[#C65D5D]/10 border-[#C65D5D] text-[#C65D5D]" : "bg-white border-[#E6E1D6] text-[#5A6B84]"}`}>{challengeMode ? "隐藏翻译" : "显示翻译"}</button>
                        <button onClick={() => switchRandomArticle(selectedLevel)} className="text-xs px-3 py-1.5 bg-white border border-[#E6E1D6] rounded text-[#1E3A5F]">随机切换长文 ↻</button>
                      </div>
                    </div>

                    <div className="grid grid-cols-5 gap-2 md:gap-4 mb-6 bg-white/60 p-4 rounded-xl text-center text-xs border border-[#E6E1D6]/60">
                      <div><p className="text-[#5A6B84] mb-1">WPM</p><p className="text-lg font-bold font-mono">{wpm}</p></div>
                      <div><p className="text-[#5A6B84] mb-1">正确字符</p><p className="text-lg font-bold font-mono text-emerald-700">{totalCorrectChars}</p></div>
                      <div><p className="text-[#5A6B84] mb-1">匹配率</p><p className="text-lg font-bold font-mono">{accuracy}%</p></div>
                      <div><p className="text-[#5A6B84] mb-1">击错数</p><p className="text-lg font-bold font-mono text-[#C65D5D]">{mistakeCount}</p></div>
                      <div><p className="text-[#5A6B84] mb-1">训练量</p><p className="text-lg font-bold font-mono text-amber-700">{userData.totalChars}字</p></div>
                    </div>

                    {/* 上方：文章静止展示与高亮画布区 */}
                    <div className="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-[#E6E1D6] leading-relaxed mb-6 select-none">
                      <div className="text-xl md:text-2xl tracking-widest text-[#1E3A5F] flex flex-wrap content-start items-center gap-y-8">
                        {(() => {
                          globalCharCounter = 0; // 重置计数器
                          return article.elements.map((el, elIdx) => {
                            return (
                              <span key={elIdx} className="inline-block px-1 mx-0.5 rounded bg-stone-50/50">
                                <ruby>
                                  <span className="text-[#1E3A5F]">{el.text}</span>
                                  <rt className="text-xs tracking-normal font-mono select-none pb-1 block">
                                    {el.kana.split("").map((char, charIdx) => {
                                      const currentGlobalIdx = globalCharCounter;
                                      globalCharCounter++; // 累加全局字数索引

                                      let charStyle = "text-gray-400"; // 还没输入到这里的默认灰色
                                      let focusStyle = "";

                                      // 如果用户已经输入到了这里
                                      if (currentGlobalIdx < userTypedKanaStr.length) {
                                        const userChar = userTypedKanaStr[currentGlobalIdx];
                                        if (userChar === char) {
                                          charStyle = "text-emerald-600 font-bold bg-emerald-50 rounded-sm px-px"; // 字符一样且顺序对：高亮显绿色
                                        } else {
                                          charStyle = "text-white bg-[#C65D5D] rounded-sm font-bold px-0.5"; // 字符不一样或者错位：高亮显红色
                                        }
                                      } else if (currentGlobalIdx === userTypedKanaStr.length) {
                                        // 正好是当前等待输入的那个高亮聚焦字位置
                                        focusStyle = "char-focused font-black text-[#1E3A5F]";
                                      }

                                      return (
                                        <span key={charIdx} className={`${charStyle} ${focusStyle} mx-px px-0.5 transition-all`}>
                                          {char}
                                        </span>
                                      );
                                    })}
                                  </rt>
                                </ruby>
                              </span>
                            );
                          });
                        })()}
                      </div>
                    </div>

                    {/* 下方：新增可见空白独立输入行 */}
                    <div className="mb-6">
                      <label className="block text-xs font-bold uppercase tracking-wider text-[#5A6B84] mb-2">⌨️ 镜像交互输入框 (在此处输入罗马字对照打字)：</label>
                      <div className="relative rounded-xl shadow-inner border border-[#E6E1D6] bg-white overflow-hidden p-1">
                        <input
                          type="text"
                          value={rawTextBuffer}
                          onChange={handleTextareaChange}
                          placeholder="点击这里开始敲键盘输入..."
                          className="w-full text-lg font-mono px-4 py-3 bg-transparent text-[#1E3A5F] placeholder-stone-300 focus:outline-none"
                          autoComplete="off" autoCapitalize="off" spellCheck="false" autoCorrect="off"
                        />
                        {/* 实时假名缓冲小尾巴 */}
                        <div className="absolute right-4 top-1/2 -translate-y-1/2 flex items-center space-x-2 pointer-events-none">
                          <span className="text-xs bg-slate-100 text-slate-500 font-mono px-2 py-1 rounded">
                            流状态长度: {userTypedKanaStr.length} / {fullArticleKanaArray.length}
                          </span>
                        </div>
                      </div>
                    </div>

                    {!challengeMode && (
                      <div className="bg-[#5A6B84]/5 p-5 rounded-xl border border-[#E6E1D6]/40 text-sm leading-relaxed text-[#5A6B84]">
                        {article.translation}
                      </div>
                    )}
                  </div>
                ) : (
                  /* 智能错词区 */
                  <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-[#E6E1D6]">
                    <div className="flex justify-between items-center mb-6">
                      <div>
                        <h2 className="text-xl font-bold text-[#1E3A5F]">本地个人弱点词库</h2>
                        <p className="text-xs text-[#5A6B84] mt-1">系统已精确根据下方轨迹对错情况捕捉盲区。</p>
                      </div>
                    </div>

                    {userData.mistakeWords.length === 0 ? (
                      <div className="text-center py-16 border-2 border-dashed border-[#E6E1D6] rounded-xl text-[#5A6B84]">🌲 目前还没有错词记录。</div>
                    ) : (
                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm border-collapse">
                          <thead>
                            <tr className="border-b border-[#E6E1D6] text-[#5A6B84] text-xs">
                              <th className="py-3 px-4">汉字</th>
                              <th className="py-3 px-4">读音</th>
                              <th className="py-3 px-4">释义</th>
                              <th className="py-3 px-4 text-center">错击数</th>
                              <th className="py-3 px-4 text-right">突击</th>
                            </tr>
                          </thead>
                          <tbody>
                            {userData.mistakeWords.slice(0, 15).map((word, i) => (
                              <tr key={i} className="border-b border-[#F8F6F1] hover:bg-[#F8F6F1]/50">
                                <td className="py-3 px-4 font-bold text-[#1E3A5F]">{word.kanji}</td>
                                <td className="py-3 px-4 font-mono text-[#5A6B84]">{word.kana}</td>
                                <td className="py-3 px-4 text-xs text-gray-500">{word.meaning}</td>
                                <td className="py-3 px-4 text-center"><span className="px-2 py-0.5 bg-red-50 text-[#C65D5D] rounded text-xs font-bold">{word.count}次</span></td>
                                <td className="py-3 px-4 text-right"><button onClick={() => startMistakeReview(word)} className="text-xs bg-[#1E3A5F] text-white px-3 py-1 rounded">重训</button></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                )}
              </main>
              <footer className="max-w-4xl mx-auto text-center py-8 text-xs text-[#5A6B84]/40 border-t border-[#E6E1D6]/40 mt-12">双轨比对打字流已加载成功</footer>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<JapaneseTypingTrainer />);
    </script>
</body>
</html>
