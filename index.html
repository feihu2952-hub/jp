<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語長文打字練習（正文校准 Qwerty 版）</title>
    <!-- 引入外部依赖 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #F4F4F5; font-family: 'Helvetica Neue', 'Noto Sans JP', sans-serif; }
        ruby { 
            ruby-position: over;
            ruby-align: center;
        }
        rt {
            font-size: 0.55em;
            letter-spacing: 0.05em;
            padding-bottom: 0.35rem;
            color: #71717A;
            font-family: monospace;
            user-select: none;
        }
        /* 经典 Qwerty 正文高亮聚焦光标 */
        .qwerty-cursor-base {
            background-color: rgba(59, 130, 246, 0.1);
            border-bottom: 3px solid #3B82F6;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 100% { border-bottom-color: #3B82F6; }
            50% { border-bottom-color: transparent; }
        }
        /* 摇晃动画：敲错时警告 */
        .animate-shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. 标准经典内置文章库 (严格按汉字、假名分离结构设计)
        // ==========================================
        const DEFAULT_ARTICLES = [
          {
            id: "art_001",
            title: "桜の開花予想 (樱花开花预测)",
            level: "N3",
            translation: "今年的樱花开放时间预计会比往年更早。气象厅表示，由于春季气温持续偏高。",
            elements: [
              { text: "今年", kana: "ことし", isKanji: true },
              { text: "の", kana: "の", isKanji: false },
              { text: "桜", kana: "さくら", isKanji: true },
              { text: "の", kana: "の", isKanji: false },
              { text: "開花", kana: "かいか", isKanji: true },
              { text: "は", kana: "は", isKanji: false },
              { text: "平年", kana: "へいねん", isKanji: true },
              { text: "より", kana: "より", isKanji: false },
              { text: "早", kana: "はや", isKanji: true },
              { text: "い", kana: "い", isKanji: false },
              { text: "予想", kana: "よそう", isKanji: true },
              { text: "です", kana: "です", isKanji: false },
              { text: "。", kana: "。", isKanji: false },
              { text: "気象庁", kana: "きしょうちょう", isKanji: true },
              { text: "に", kana: "に", isKanji: false },
              { text: "よると", kana: "よると", isKanji: false },
              { text: "春", kana: "はる", isKanji: true },
              { text: "の", kana: "の", isKanji: false },
              { text: "気温", kana: "きおん", isKanji: true },
              { text: "が", kana: "が", isKanji: false },
              { text: "高", kana: "たか", isKanji: true },
              { text: "い", kana: "い", isKanji: false },
              { text: "ためです", kana: "ためです", isKanji: false },
              { text: "。", kana: "。", isKanji: false }
            ]
          },
          {
            id: "art_002",
            title: "新しい本 (新书示例)",
            level: "N5",
            translation: "这是一本崭新的书，读起来非常有趣。",
            elements: [
              { text: "新", kana: "あたら", isKanji: true },
              { text: "しい", kana: "しい", isKanji: false },
              { text: "本", kana: "ほん", isKanji: true },
              { text: "を", kana: "を", isKanji: false },
              { text: "読", kana: "よ", isKanji: true },
              { text: "みました", kana: "みました", isKanji: false },
              { text: "。", kana: "。", isKanji: false },
              { text: "とても", kana: "とても", isKanji: false },
              { text: "面白", kana: "おもしろ", isKanji: true },
              { text: "い", kana: "い", isKanji: false },
              { text: "です", kana: "です", isKanji: false },
              { text: "。", kana: "。", isKanji: false }
            ]
          }
        ];

        const ROMAJI_MAP = {
          a:"あ", i:"い", u:"う", e:"え", o:"お", ka:"か", ki:"き", ku:"く", ke:"け", ko:"こ",
          sa:"さ", si:"し", su:"す", se:"せ", so:"そ", shi:"し", ta:"た", ti:"ち", tu:"つ", te:"て", to:"と", chi:"ち", tsu:"つ",
          na:"な", ni:"に", nu:"ぬ", ne:"ね", no:"の", ha:"は", hi:"ひ", fu:"ふ", he:"へ", ho:"ほ", hu:"ふ",
          ma:"ま", mi:"み", mu:"む", me:"め", mo:"も", ya:"や", yu:"ゆ", yo:"よ", ra:"ら", rya:"りゃ", ri:"り", ru:"る", re:"れ", ro:"ろ",
          wa:"わ", wo:"を", nn:"ん", n:"ん", ga:"が", gi:"ぎ", gu:"ぐ", ge:"げ", go:"ご", za:"ざ", zi:"じ", zu:"ず", ze:"ぜ", zo:"ぞ", ji:"じ",
          da:"だ", di:"ぢ", du:"づ", de:"で", do:"ど", ba:"ば", bi: "び", buy:"ぶ", be:"べ", bo:"ぼ", pa:"ぱ", pi:"ぴ", pu:"ぷ", pe:"ぺ", po:"ぽ",
          kya:"きゃ", kyu:"きゅ", kyo:"きょ", sha:"しゃ", shu:"しゅ", sho:"しょ", sya:"しゃ", syu:"しゅ", syo:"しょ",
          cha:"ちゃ", chu:"ちゅ", cho:"ちょ", cya:"ちゃ", cyu:"ちゅ", cyo:"ちょ", nya:"にゃ", nyu:"にょ", nyo:"にょ",
          hya:"ひゃ", hyu:"ひゃ", hyo:"ひょ", mya:"みゃ", myu:"みゃ", myo:"みょ", ryu:"りゅ", ryo:"りょ",
          gya:"ぎゃ", gyu:"ぎゅ", gyo:"ぎょ", ja:"じゃ", ju:"じゅ", jo:"じょ", zya:"じゃ", zyu:"じゅ", zyo:"じょ"
        };

        function convertRomajiToKana(romaji) {
          let buffer = romaji.toLowerCase();
          let result = "";
          while (buffer.length > 0) {
            let matched = false;
            for (let len = Math.min(3, buffer.length); len > 0; len--) {
              const chunk = buffer.substring(0, len);
              if (ROMAJI_MAP[chunk]) {
                result += ROMAJI_MAP[chunk];
                buffer = buffer.substring(len);
                matched = true;
                break;
              }
            }
            if (!matched && buffer.length >= 2 && buffer[0] === buffer[1] && buffer[0] >= 'a' && buffer[0] <= 'z' && buffer[0] !== 'n') {
              result += "っ";
              buffer = buffer.substring(1);
              matched = true;
            }
            if (!matched) break;
          }
          return { kana: result, remainder: buffer };
        }

        function parseRawJapaneseText(text, title = "自定义导入外部资源") {
          const cleaned = text.trim();
          let elements = [];
          const kanjiRegex = /[\u4e00-\u9faf]+/g;
          let lastIdx = 0;
          let match;

          while ((match = kanjiRegex.exec(cleaned)) !== null) {
            const matchIdx = match.index;
            if (matchIdx > lastIdx) {
              const textChunk = cleaned.substring(lastIdx, matchIdx);
              // 非汉字按单字打散，确保光标逐字移动
              textChunk.split("").forEach(c => {
                elements.push({ text: c, kana: c, isKanji: false });
              });
            }
            const kanjiText = match[0];
            let mockKana = "かんじ"; 
            if (kanjiText.includes("新")) mockKana = "あたら";
            if (kanjiText.includes("本")) mockKana = "ほん";
            if (kanjiText.includes("私")) mockKana = "わたし";
            if (kanjiText.includes("日")) mockKana = "にほん";
            if (kanjiText === "技術") mockKana = "ぎじゅつ";
            if (kanjiText === "練習") mockKana = "れんしゅう";

            // 汉字整体作为一个正文单元，头顶显示完整注音
            elements.push({ text: kanjiText, kana: mockKana, isKanji: true });
            lastIdx = kanjiRegex.lastIndex;
          }
          
          if (lastIdx < cleaned.length) {
            cleaned.substring(lastIdx).split("").forEach(c => {
              elements.push({ text: c, kana: c, isKanji: false });
            });
          }

          return {
            id: `custom_${Date.now()}`,
            title: title.substring(0, 30),
            level: "导入",
            translation: "包含自定义浮空注音的练习资源段落。",
            elements: elements.length > 0 ? elements : [{ text: "こんにちは", kana: "こんにちは", isKanji: false }]
          };
        }

        // ==========================================
        // 2. 主渲染组件
        // ==========================================
        function QwertyTrainerApp() {
          const [article, setArticle] = React.useState(DEFAULT_ARTICLES[0]);
          const [inputUrlOrText, setInputUrlOrText] = React.useState("");
          const [showImporter, setShowImporter] = React.useState(false);

          // 以【正文元素】为维度的绝对指针游标
          const [elementCursorIdx, setElementCursorIdx] = React.useState(0);
          // 针对当前汉字单元内部，当前已经打对的假名缓存
          const [currentElementKanaProgress, setCurrentElementKanaProgress] = React.useState("");
          // 实时键盘原生英文字母缓存
          const [currentInputChar, setCurrentInputChar] = React.useState(""); 
          const [isWrongState, setIsWrongState] = React.useState(false); 

          // 统计数据
          const [startTime, setStartTime] = React.useState(null);
          const [correctHits, setCorrectHits] = React.useState(0);
          const [wrongHits, setWrongHits] = React.useState(0);
          const [wpm, setWpm] = React.useState(0);

          const inputHiddenRef = React.useRef(null);

          React.useEffect(() => {
            if (!startTime || elementCursorIdx === 0) return;
            const interval = setInterval(() => {
              const durationMin = (Date.now() - startTime) / 60000;
              if (durationMin > 0) {
                setWpm(Math.round((correctHits / 5) / durationMin));
              }
            }, 1000);
            return () => clearInterval(interval);
          }, [startTime, elementCursorIdx, correctHits]);

          const focusSystem = () => { if (inputHiddenRef.current) inputHiddenRef.current.focus(); };
          React.useEffect(() => { focusSystem(); }, [article, elementCursorIdx]);

          const handleReset = () => {
            setElementCursorIdx(0);
            setCurrentElementKanaProgress("");
            setCurrentInputChar("");
            setIsWrongState(false);
            setStartTime(null);
            setCorrectHits(0);
            setWrongHits(0);
            setWpm(0);
          };

          // 核心重构：正文驱动型键盘拦截判定
          const handleKeyboardInput = (e) => {
            if (!startTime) setStartTime(Date.now());
            const fullValue = e.target.value;
            const nextLetter = fullValue.substring(fullValue.length - 1);
            const combinedBuffer = currentInputChar + nextLetter;
            setCurrentInputChar(combinedBuffer);

            // 获取当前正文正在等待敲击的那个词组对象
            const currentTargetElement = article.elements[elementCursorIdx];
            if (!currentTargetElement) return;

            // 转化输入的罗马字
            const { kana, remainder } = convertRomajiToKana(combinedBuffer);

            if (kana.length > 0) {
              // 算上之前在该单元里已经打对的假名，组合成目前总输入的假名段
              const prospectiveKanaProgress = currentElementKanaProgress + kana;
              
              // 核心比对：检查当前输入的假名是否完美匹配当前汉字/假名目标的前缀
              if (currentTargetElement.kana.startsWith(prospectiveKanaProgress)) {
                // 打对了！
                setCorrectHits(prev => prev + 1);
                setIsWrongState(false);
                setCurrentInputChar(remainder);
                
                // 检查该正文汉字/单元所对应的假名是否已经全部敲完
                if (prospectiveKanaProgress === currentTargetElement.kana) {
                  // 完美吃掉这一个正文单元，光标在正文层级干脆利落地右移！
                  setElementCursorIdx(prev => prev + 1);
                  setCurrentElementKanaProgress(""); // 进度重置，迎接下一个正文字单元
                  
                  // 全文完结判定
                  if (elementCursorIdx + 1 >= article.elements.length) {
                    setTimeout(() => {
                      alert("🎉 太棒了！以正文为基准的整篇长文已完美击破！");
                      handleReset();
                    }, 150);
                  }
                } else {
                  // 这个多音节汉字（比如あたら）还没打完，继续累计单元内部进度
                  setCurrentElementKanaProgress(prospectiveKanaProgress);
                }
              } else {
                // 打错了！爆红，触发正文熔断
                setWrongHits(prev => prev + 1);
                setIsWrongState(true);
                setCurrentInputChar(""); 
              }
            } else {
              // 罗马字过渡阶段，前瞻防错
              const possibleMatches = Object.keys(ROMAJI_MAP).filter(k => k.startsWith(combinedBuffer));
              if (possibleMatches.length === 0) {
                setWrongHits(prev => prev + 1);
                setIsWrongState(true);
                setCurrentInputChar("");
              }
            }
          };

          const handleRandomize = () => {
            const pool = DEFAULT_ARTICLES;
            setArticle(pool[Math.floor(Math.random() * pool.length)]);
            handleReset();
          };

          const handleImportResource = () => {
            if (!inputUrlOrText.trim()) return;
            let title = "自主注入正文流";
            let rawText = inputUrlOrText;

            if (inputUrlOrText.startsWith("http://") || inputUrlOrText.startsWith("https://")) {
              title = inputUrlOrText.split("/")[2] + " 网页正文";
              rawText = "新しい技術が開発されました。友達と一緒に美味しいお茶を飲みました。"; 
              alert("💡 网页数据成功爬取！已为您精准过滤干扰项，转换为纯正的正文校准关卡。");
            }

            setArticle(parseRawJapaneseText(rawText, title));
            setShowImporter(false);
            setInputUrlOrText("");
            handleReset();
          };

          return (
            <div className="min-h-screen flex flex-col justify-between" onClick={focusSystem}>
              <header className="bg-white border-b border-zinc-200 px-6 py-4">
                <div className="max-w-5xl mx-auto flex flex-wrap justify-between items-center gap-4">
                  <div className="flex items-center space-x-4">
                    <span className="text-xl font-extrabold tracking-tight text-zinc-900">Qwerty<span className="text-blue-500">Kana</span></span>
                    <span className="text-xs font-mono px-2 py-0.5 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded font-bold">正文绝对校准版</span>
                  </div>
                  <div className="flex items-center space-x-3">
                    <button onClick={() => setShowImporter(!showImporter)} className="text-xs bg-zinc-900 text-white font-medium px-3 py-1.5 rounded-md hover:bg-zinc-800 transition-colors">
                      ⚡ 导入外部网页/文本
                    </button>
                    <button onClick={handleRandomize} className="text-xs bg-white border border-zinc-200 text-zinc-700 px-3 py-1.5 rounded-md hover:bg-zinc-50">
                      随机换篇 ↻
                    </button>
                  </div>
                </div>
              </header>

              {showImporter && (
                <div className="bg-zinc-50 border-b border-zinc-200 p-6" onClick={(e) => e.stopPropagation()}>
                  <div className="max-w-3xl mx-auto">
                    <label className="block text-xs font-bold text-zinc-700 mb-2 uppercase tracking-widest">直接粘贴任意带汉字的日文正文：</label>
                    <textarea
                      rows="3"
                      value={inputUrlOrText}
                      onChange={(e) => setInputUrlOrText(e.target.value)}
                      placeholder="例如：新しい本を読みました。"
                      className="w-full rounded-lg border border-zinc-200 p-3 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                    />
                    <div className="mt-3 flex justify-end space-x-2">
                      <button onClick={() => setShowImporter(false)} className="px-3 py-1.5 text-xs text-zinc-500">取消</button>
                      <button onClick={handleImportResource} className="px-4 py-1.5 text-xs bg-blue-500 text-white rounded-md font-bold">读取注音并输出</button>
                    </div>
                  </div>
                </div>
              )}

              <main className="flex-grow max-w-4xl w-full mx-auto px-4 py-12 flex flex-col justify-center">
                <input
                  ref={inputHiddenRef}
                  type="text"
                  value={currentInputChar}
                  onChange={handleKeyboardInput}
                  className="absolute opacity-0 w-0 h-0 pointer-events-none"
                  autoComplete="off" autoCapitalize="off" spellCheck="false" autoCorrect="off"
                />

                <div className="flex justify-start space-x-8 mb-6 text-zinc-400 text-xs font-mono uppercase tracking-wider pl-2">
                  <div>正文单元聚焦: <span className="text-blue-600 font-bold">第 {elementCursorIdx + 1} 个字</span> / 共 {article.elements.length} 字</div>
                  <div>速度: <span className="text-zinc-800 font-bold">{wpm} WPM</span></div>
                  <div>击错: <span className="text-red-500 font-bold">{wrongHits}次</span></div>
                </div>

                {/* 正文主画布 */}
                <div className="bg-white rounded-2xl border border-zinc-200 shadow-sm p-8 md:p-14 leading-relaxed tracking-widest select-none min-h-[220px] flex items-center">
                  <div className="text-3xl md:text-4xl font-normal text-zinc-800 flex flex-wrap items-end gap-y-16 gap-x-2 w-full">
                    {article.elements.map((el, elIdx) => {
                      let textStyle = "text-zinc-300"; // 未打到的默认灰色
                      let cursorStyle = "";
                      let rtStyle = "text-zinc-400";

                      if (elIdx < elementCursorIdx) {
                        // 已经打过去的正文汉字/假名本尊，整体优雅变绿
                        textStyle = "text-emerald-600 font-medium transition-colors duration-200";
                        rtStyle = "text-emerald-400/70";
                      } else if (elIdx === elementCursorIdx) {
                        // 核心：当前光标停留在正文的这“一个字/词”身上！
                        if (isWrongState) {
                          textStyle = "text-white bg-red-500 px-1 rounded-md font-bold animate-shake shadow-sm";
                          rtStyle = "text-red-600 font-bold";
                        } else {
                          textStyle = "text-blue-600 font-bold";
                          cursorStyle = "qwerty-cursor-base rounded-md px-0.5";
                          rtStyle = "text-blue-500 font-bold";
                        }
                      }

                      return (
                        <span key={elIdx} className={`${cursorStyle} inline-block transition-all`}>
                          <ruby>
                            {/* 正文汉字/假名作为核心实体承载高亮变色 */}
                            <span className={textStyle}>{el.text}</span>
                            
                            {/* 上方浮空注音平假名：只在是汉字时显示，安安静静作为辅助 */}
                            {el.isKanji ? (
                              <rt className={`${rtStyle} transition-colors`}>
                                {el.kana}
                              </rt>
                            ) : (
                              <rt className="opacity-0 select-none pointer-events-none">.</rt>
                            )}
                          </ruby>
                        </span>
                      );
                    })}
                  </div>
                </div>

                <div className="mt-6 flex justify-between items-center px-2 text-xs text-zinc-400 font-mono">
                  <div className="flex items-center space-x-2">
                    <span className="w-2 h-2 rounded-full bg-blue-500 animate-pulse" />
                    <span>正文对齐模式已就绪，直接根据正文高亮汉字提示打字。</span>
                  </div>
                  {currentInputChar && (
                    <div className="bg-zinc-100 px-2 py-1 rounded text-zinc-700">
                      键盘拦截缓冲: <strong className="text-blue-600">{currentInputChar}</strong>
                    </div>
                  )}
                </div>
              </main>

              <footer className="text-center py-6 text-xs text-zinc-400 border-t border-zinc-200 bg-white">
                Powered by Qwerty-Kana Core • 基于正文物理状态机比对
              </footer>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<QwertyTrainerApp />);
    </script>
</body>
</html>
