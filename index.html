<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語精読本</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #faf8f4;
    --accent: #c8451a;
    --accent2: #2563eb;
    --muted: #6b6b7a;
    --border: #e2ddd6;
    --card: #ffffff;
    --active-bg: rgba(200,69,26,0.08);
    --reading-bg: rgba(37,99,235,0.12);
    --tag-bg: #f0ede8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 12px rgba(0,0,0,0.06);
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 56px;
    flex-wrap: wrap;
    padding: 8px 0;
  }
  .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--ink);
    white-space: nowrap;
  }
  .logo span { color: var(--accent); }
  .header-sep { flex: 1; }

  .level-group {
    display: flex;
    gap: 4px;
    background: var(--tag-bg);
    border-radius: 10px;
    padding: 4px;
  }
  .level-btn {
    padding: 5px 12px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .level-btn:hover { background: rgba(0,0,0,0.06); color: var(--ink); }
  .level-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(200,69,26,0.25);
  }

  .read-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border-radius: 8px;
    border: 1.5px solid currentColor;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .read-btn.off { color: var(--accent2); background: rgba(37,99,235,0.05); }
  .read-btn.off:hover { background: rgba(37,99,235,0.12); }
  .read-btn.on { color: #fff; background: var(--accent2); border-color: var(--accent2); animation: pulse-blue 1.4s infinite; }

  @keyframes pulse-blue {
    0%,100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(37,99,235,0); }
  }

  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 24px 60px;
  }

  .article-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .meta-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-level { background: var(--accent); color: #fff; }
  .badge-count { background: var(--tag-bg); color: var(--muted); border: 1px solid var(--border); }
  .article-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
  }

  .passage-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 44px;
    margin-bottom: 20px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.04);
    min-height: 180px;
  }

  .passage-text {
    line-height: 3.8;
    font-size: 22px;
    font-family: 'Noto Serif JP', serif;
    color: var(--ink);
    letter-spacing: 0.06em;
    word-break: break-all;
  }

  ruby {
    ruby-position: over;
    ruby-align: center;
    display: inline-ruby;
  }
  rt {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.05em;
    line-height: 1;
    text-align: center;
    padding-bottom: 2px;
  }
  rt.ghost {
    opacity: 0;
    pointer-events: none;
    user-select: none;
  }

  .word-clickable {
    cursor: pointer;
    border-bottom: 1.5px dashed rgba(200,69,26,0.5);
    border-radius: 3px;
    transition: background 0.15s;
  }
  .word-clickable:hover { background: var(--active-bg); }
  .word-active { background: var(--active-bg) !important; color: var(--accent); }

  .reading-hi {
    background: var(--reading-bg);
    border-radius: 4px;
    color: var(--accent2);
  }

  .analysis-card {
    background: linear-gradient(135deg, #f0f4ff 0%, #fff8f5 100%);
    border: 1px solid #dbe4ff;
    border-radius: 14px;
    padding: 18px 22px;
    margin-bottom: 20px;
    animation: slideDown 0.2s ease-out;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .analysis-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .analysis-word {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
  }
  .analysis-tag {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--tag-bg);
    color: var(--muted);
    margin-left: 10px;
  }
  .close-btn {
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .close-btn:hover { background: rgba(0,0,0,0.07); }
  .analysis-meaning {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .analysis-note {
    font-size: 12.5px;
    color: #444;
    line-height: 1.75;
    background: rgba(255,255,255,0.8);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .translation-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .trans-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 8px;
    padding: 5px 12px;
    transition: all 0.15s;
  }
  .trans-toggle:hover { background: var(--tag-bg); }
  .trans-box {
    background: var(--ink);
    color: #e8e4dc;
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 13px;
    line-height: 1.85;
    margin-bottom: 20px;
    animation: slideDown 0.2s ease-out;
  }
  .trans-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #888;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .input-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 20px;
  }
  .input-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }
  .input-row { display: flex; gap: 10px; }
  .text-input {
    flex: 1;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .text-input:focus { border-color: var(--accent2); }
  .submit-btn {
    padding: 9px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: #a83615; }

  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .nav-btn {
    padding: 7px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--tag-bg); color: var(--ink); }

  .speed-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }
  .speed-wrap input[type=range] { width: 80px; accent-color: var(--accent2); }

  @media (max-width: 600px) {
    .passage-card { padding: 24px 18px; }
    .passage-text { font-size: 18px; line-height: 4; }
    rt { font-size: 10px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">精<span>読</span>本</div>
    <div class="level-group" id="levelGroup">
      <button class="level-btn" data-level="0" onclick="selectLevel(0)">入門 ≤50字</button>
      <button class="level-btn" data-level="1" onclick="selectLevel(1)">初級 ≤150字</button>
      <button class="level-btn active" data-level="2" onclick="selectLevel(2)">中級 ≤350字</button>
      <button class="level-btn" data-level="3" onclick="selectLevel(3)">上級 ≤700字</button>
    </div>
    <div class="header-sep"></div>
    <div class="speed-wrap">
      <span>速度</span>
      <input type="range" id="speedRange" min="0.5" max="1.5" step="0.1" value="0.85" oninput="updateSpeed(this.value)">
      <span id="speedVal">0.85×</span>
    </div>
    <button class="read-btn off" id="readBtn" onclick="toggleRead()">
      <span id="readIcon">▶</span>
      <span id="readLabel">AI 朗読</span>
    </button>
  </div>
</header>

<main class="main">

  <div class="input-section">
    <span class="input-label">📥 粘贴任意日文段落，自动注音分析</span>
    <div class="input-row">
      <input class="text-input" id="userInput" type="text" placeholder="在此粘贴日文文章…">
      <button class="submit-btn" onclick="loadUserText()">解析 ⚡</button>
    </div>
  </div>

  <div class="article-meta" id="articleMeta">
    <span class="meta-badge badge-level" id="badgeLevel">中級</span>
    <span class="meta-badge badge-count" id="badgeCount">● 字</span>
    <span class="article-title" id="articleTitle">記事タイトル</span>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="prevArticle()">← 前の記事</button>
    <button class="nav-btn" onclick="nextArticle()">次の記事 →</button>
  </div>

  <div class="passage-card">
    <div class="passage-text" id="passageText"></div>
  </div>

  <div class="analysis-card" id="analysisCard" style="display:none">
    <div class="analysis-head">
      <div style="display:flex;align-items:center;gap:6px">
        <span class="analysis-word" id="anaWord"></span>
        <span class="analysis-tag" id="anaTag"></span>
      </div>
      <button class="close-btn" onclick="closeAnalysis()">✕</button>
    </div>
    <div class="analysis-meaning" id="anaMeaning"></div>
    <div class="analysis-note" id="anaNote"></div>
  </div>

  <div class="translation-row">
    <button class="trans-toggle" onclick="toggleTrans()">
      <span>🇨🇳</span>
      <span id="transToggleLabel">显示中文译文</span>
    </button>
  </div>
  <div class="trans-box" id="transBox" style="display:none">
    <span class="trans-label">中文对照翻译</span>
    <span id="transText"></span>
  </div>

</main>

<script>
const LEVELS = [
  { name: "入門", label: "入門 ≤50字", maxChars: 50 },
  { name: "初級", label: "初級 ≤150字", maxChars: 150 },
  { name: "中級", label: "中級 ≤350字", maxChars: 350 },
  { name: "上級", label: "上級 ≤700字", maxChars: 700 },
];

const ARTICLES = [
  {
    level: 0,
    title: "今日の天気",
    translation: "今天天气很好。天空是蓝色的，太阳很耀眼。我去了公园。",
    tokens: [
      { text:"今日", kana:"きょう", analysis:{tag:"名詞",meaning:"今天",note:"「今日」可読作「きょう」（口语）或「こんにち」（正式），日常会话中多用「きょう」。"} },
      { text:"は" },
      { text:"天気", kana:"てんき", analysis:{tag:"名詞",meaning:"天气",note:"「天気がいい」（天气好）是最常用搭配。"} },
      { text:"が" },
      { text:"いいです。" },
      { text:"空", kana:"そら", analysis:{tag:"名詞",meaning:"天空",note:"「空が青い」（天空是蓝色的）高频句型。"} },
      { text:"は" },
      { text:"青", kana:"あお", analysis:{tag:"イ形容詞",meaning:"蓝色的",note:"颜色词「青い」。注意日语中「青」有时也泛指绿色（如「青信号」= 绿灯）。"} },
      { text:"くて、" },
      { text:"太陽", kana:"たいよう", analysis:{tag:"名詞",meaning:"太阳",note:"「太陽がまぶしい」= 太阳很耀眼。"} },
      { text:"が" },
      { text:"まぶしいです。" },
      { text:"公園", kana:"こうえん", analysis:{tag:"名詞",meaning:"公园",note:"「公園に行く」去公园，「公園で遊ぶ」在公园玩。"} },
      { text:"に" },
      { text:"行", kana:"い", analysis:{tag:"動詞",meaning:"去",note:"「行く」的连用形「行き」→ 「行った」（过去式）。"} },
      { text:"きました。" },
    ]
  },
  {
    level: 0,
    title: "朝ごはん",
    translation: "早上我吃了面包和鸡蛋。然后喝了牛奶。很好吃。",
    tokens: [
      { text:"朝", kana:"あさ", analysis:{tag:"名詞",meaning:"早上",note:"「朝ご飯」早饭，「朝起きる」早上起床。"} },
      { text:"、" },
      { text:"パンと" },
      { text:"卵", kana:"たまご", analysis:{tag:"名詞",meaning:"鸡蛋",note:"「卵」（生鸡蛋）vs「玉子」（熟鸡蛋料理），书写上可互换。"} },
      { text:"を" },
      { text:"食", kana:"た", analysis:{tag:"動詞",meaning:"吃（连用形）",note:"「食べる」是经典二类动词，「食べました」为礼貌过去式。"} },
      { text:"べました。それから" },
      { text:"牛乳", kana:"ぎゅうにゅう", analysis:{tag:"名詞",meaning:"牛奶",note:"「牛乳」偏正式书面语；口语也说「ミルク」。"} },
      { text:"を" },
      { text:"飲", kana:"の", analysis:{tag:"動詞",meaning:"喝（连用形）",note:"「飲む」一类动词，「飲みます」礼貌体。"} },
      { text:"みました。" },
      { text:"おいしかったです。" },
    ]
  },
  {
    level: 1,
    title: "図書館での勉強",
    translation: "昨天我在图书馆学习到很晚。图书馆里很安静，非常适合学习。我学习了日语和数学。下次也想去图书馆学习。",
    tokens: [
      { text:"昨日", kana:"きのう", analysis:{tag:"名詞",meaning:"昨天",note:"「昨日」口语读「きのう」，正式场合「さくじつ」。"} },
      { text:"、" },
      { text:"図書館", kana:"としょかん", analysis:{tag:"名詞",meaning:"图书馆",note:"「図書館で勉強する」在图书馆学习，「図書館に行く」去图书馆。"} },
      { text:"で" },
      { text:"夜", kana:"よる", analysis:{tag:"名詞",meaning:"夜晚",note:"「夜遅くまで」直到深夜，常见副词短语。"} },
      { text:"遅", kana:"おそ", analysis:{tag:"イ形容詞",meaning:"晚、迟",note:"「遅くまで」= 到很晚。「遅い」可形容时间也可形容速度慢。"} },
      { text:"くまで" },
      { text:"勉強", kana:"べんきょう", analysis:{tag:"名詞/サ変動詞",meaning:"学习",note:"「勉強する」是最常用的「学习」表达，サ変动词可直接接「する」。"} },
      { text:"しました。" },
      { text:"図書館", kana:"としょかん" },
      { text:"の中は" },
      { text:"静", kana:"しず", analysis:{tag:"ナ形容詞",meaning:"安静的",note:"「静かな場所」安静的地方，ナ形容词修饰名词时需加「な」。"} },
      { text:"かで、とても" },
      { text:"勉強", kana:"べんきょう" },
      { text:"しやすいです。" },
      { text:"日本語", kana:"にほんご", analysis:{tag:"名詞",meaning:"日语",note:"「日本語を勉強する」学习日语，是学日语者最常遇到的句型。"} },
      { text:"と" },
      { text:"数学", kana:"すうがく", analysis:{tag:"名詞",meaning:"数学",note:"理科科目的总称，日本高中理科核心课程之一。"} },
      { text:"を" },
      { text:"勉強", kana:"べんきょう" },
      { text:"しました。また" },
      { text:"今度", kana:"こんど", analysis:{tag:"名詞",meaning:"下次、这次",note:"「今度」兼有「这次」和「下次」两义，需结合语境判断。"} },
      { text:"も" },
      { text:"図書館", kana:"としょかん" },
      { text:"で" },
      { text:"勉強", kana:"べんきょう" },
      { text:"したいです。" },
    ]
  },
  {
    level: 1,
    title: "日本の食べ物",
    translation: "日本料理有很多种类。寿司和拉面尤其受欢迎。各地还有许多当地特色料理，比如大阪的章鱼烧、北海道的螃蟹等，都非常好吃。",
    tokens: [
      { text:"日本", kana:"にほん" },
      { text:"の" },
      { text:"料理", kana:"りょうり", analysis:{tag:"名詞",meaning:"料理、菜肴",note:"「料理する」做饭，「料理人」厨师。"} },
      { text:"にはたくさんの" },
      { text:"種類", kana:"しゅるい", analysis:{tag:"名詞",meaning:"种类",note:"「〜の種類がある」有…的种类，是分类描述的核心句型。"} },
      { text:"があります。" },
      { text:"特", kana:"とく", analysis:{tag:"副詞",meaning:"特别",note:"「特に」尤其、特别，是表示强调的高频副词。"} },
      { text:"に" },
      { text:"寿司", kana:"すし", analysis:{tag:"名詞",meaning:"寿司",note:"日本代表性料理，有「握り寿司」「巻き寿司」等多种形式。"} },
      { text:"や" },
      { text:"ラーメンは" },
      { text:"人気", kana:"にんき", analysis:{tag:"名詞",meaning:"受欢迎",note:"「人気がある」或「人気な〜」都可以表示"受欢迎的"。"} },
      { text:"があります。また、" },
      { text:"大阪", kana:"おおさか", analysis:{tag:"固有名詞",meaning:"大阪（城市名）",note:"日本第二大城市，以「たこ焼き」「お好み焼き」等美食著称。"} },
      { text:"の" },
      { text:"たこ焼きや" },
      { text:"北海道", kana:"ほっかいどう", analysis:{tag:"固有名詞",meaning:"北海道",note:"日本最北的大岛，以海鲜、乳制品闻名。"} },
      { text:"の" },
      { text:"カニなど、" },
      { text:"各地", kana:"かくち", analysis:{tag:"名詞",meaning:"各地",note:"「各地の名物」各地的名产，固定搭配。"} },
      { text:"においしいご当地料理がたくさんあります。" },
    ]
  },
  {
    level: 2,
    title: "日本の自動販売機文化",

      { text:"持続可能性", kana:"じぞくかのうせい", analysis:{tag:"名詞",meaning:"可持续性",note:"「持続可能性を確保する」确保可持续性，SDGs相关核心词。"} },
      { text:"を脅かす" },
      { text:"可能性", kana:"かのうせい", analysis:{tag:"名詞",meaning:"可能性",note:"「〜する可能性がある」有…的可能性，表示推测的重要句型。"} },
      { text:"があります。こうした" },
      { text:"状況", kana:"じょうきょう", analysis:{tag:"名詞",meaning:"状况、局面",note:"「〜という状況」处于…的状况，「状況を打開する」打破局面。"} },
      { text:"に対応するため、政府は" },
      { text:"育児", kana:"いくじ", analysis:{tag:"名詞",meaning:"育儿",note:"「育児支援」育儿支持，「育児休業（育休）」育儿假。"} },
      { text:"支援の" },
      { text:"充実", kana:"じゅうじつ", analysis:{tag:"名詞/サ変動詞",meaning:"充实、完善",note:"「〜を充実させる」使…更加完善，政策文章高频词。"} },
      { text:"や外国人" },
      { text:"労働力", kana:"ろうどうりょく", analysis:{tag:"名詞",meaning:"劳动力",note:"「労働力を確保する」确保劳动力，「外国人労働力」外籍劳动力。"} },
      { text:"の" },
      { text:"受け入れ", kana:"うけいれ", analysis:{tag:"名詞",meaning:"接受、引进",note:"「〜を受け入れる」接受、引进，「外国人の受け入れ」引进外籍人士。"} },
      { text:"促進などの政策を打ち出しています。また、企業側でも、" },
      { text:"技術革新", kana:"ぎじゅつかくしん", analysis:{tag:"名詞",meaning:"技术革新",note:"「技術革新を推進する」推进技术创新，产业政策核心词。"} },
      { text:"や" },
      { text:"自動化", kana:"じどうか", analysis:{tag:"名詞",meaning:"自动化",note:"「〜を自動化する」将…自动化，制造业、IT行业高频词。"} },
      { text:"によって" },
      { text:"生産性", kana:"せいさんせい", analysis:{tag:"名詞",meaning:"生产率、生产效率",note:"「生産性を向上させる」提升生产率，「低生産性」低效率。"} },
      { text:"を高める取り組みを模索しています。この課題は、単独の政策では" },
      { text:"解決", kana:"かいけつ", analysis:{tag:"名詞/サ変動詞",meaning:"解决",note:"「〜を解決する」解决…，「解決策」解决方案。"} },
      { text:"が" },
      { text:"困難", kana:"こんなん", analysis:{tag:"ナ形容詞/名詞",meaning:"困难",note:"「〜が困難だ」做…很困难，书面语比「難しい」更正式。"} },
      { text:"であり、政府・企業・市民が" },
      { text:"連携", kana:"れんけい", analysis:{tag:"名詞/サ変動詞",meaning:"联携、协作",note:"「〜と連携する」与…协作，「官民連携」官民合作。"} },
      { text:"して取り組むことが求められています。" },
    ]
  }
];

let currentLevel = 2;
let articleIndex = 0;
let currentArticle = null;
let showTrans = false;
let activeTokenIdx = null;
let speechRate = 0.85;
let synth = window.speechSynthesis;
let isReading = false;
let highlightedSpans = [];
let activeRuby = null;

function articlesForLevel(level) {
  return ARTICLES.filter(a => a.level === level);
}

function charCount(article) {
  return article.tokens.reduce((s, t) => s + t.text.length, 0);
}

function selectLevel(level) {
  stopReading();
  currentLevel = level;
  articleIndex = 0;
  closeAnalysis();
  document.querySelectorAll('.level-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.level) === level);
  });
  renderArticle();
}

function prevArticle() {
  stopReading(); closeAnalysis();
  const pool = articlesForLevel(currentLevel);
  if (!pool.length) return;
  articleIndex = (articleIndex - 1 + pool.length) % pool.length;
  renderArticle();
}

function nextArticle() {
  stopReading(); closeAnalysis();
  const pool = articlesForLevel(currentLevel);
  if (!pool.length) return;
  articleIndex = (articleIndex + 1) % pool.length;
  renderArticle();
}

function renderArticle() {
  const pool = articlesForLevel(currentLevel);
  if (!pool.length) {
    document.getElementById('passageText').innerHTML = '<span style="color:#aaa;font-size:14px">この等級の記事はまだありません。</span>';
    return;
  }
  if (articleIndex >= pool.length) articleIndex = 0;
  currentArticle = pool[articleIndex];

  const count = charCount(currentArticle);
  document.getElementById('badgeLevel').textContent = LEVELS[currentLevel].name;
  document.getElementById('badgeCount').textContent = count + ' 字';
  document.getElementById('articleTitle').textContent = currentArticle.title;

  const container = document.getElementById('passageText');
  container.innerHTML = '';
  highlightedSpans = [];
  let spanIdx = 0;

  currentArticle.tokens.forEach((token, tidx) => {
    const wrapper = document.createElement('span');
    wrapper.className = 'token-wrap';
    const ruby = document.createElement('ruby');

    if (token.analysis) {
      ruby.classList.add('word-clickable');
      ruby.dataset.tidx = tidx;
      ruby.onclick = (e) => { e.stopPropagation(); onWordClick(tidx, ruby); };
    }

    const chars = [...token.text];
    chars.forEach(ch => {
      const cs = document.createElement('span');
      cs.className = 'char-span';
      cs.textContent = ch;
      cs.dataset.spanIdx = spanIdx++;
      ruby.appendChild(cs);
      highlightedSpans.push(cs);
    });

    const rt = document.createElement('rt');
    if (token.kana) {
      rt.textContent = token.kana;
    } else {
      rt.className = 'ghost';
      rt.textContent = '\u200b';
    }
    ruby.appendChild(rt);
    wrapper.appendChild(ruby);
    container.appendChild(wrapper);
  });

  document.getElementById('transText').textContent = currentArticle.translation;
  document.getElementById('transBox').style.display = showTrans ? 'block' : 'none';
  document.getElementById('transToggleLabel').textContent = showTrans ? '隐藏中文译文' : '显示中文译文';
}

function onWordClick(tidx, rubyEl) {
  if (!currentArticle) return;
  const token = currentArticle.tokens[tidx];
  if (!token.analysis) return;
  if (activeRuby) activeRuby.classList.remove('word-active');
  if (activeTokenIdx === tidx) {
    activeTokenIdx = null; activeRuby = null; closeAnalysis(); return;
  }
  activeTokenIdx = tidx;
  activeRuby = rubyEl;
  rubyEl.classList.add('word-active');
  document.getElementById('anaWord').textContent = token.text + (token.kana ? `（${token.kana}）` : '');
  document.getElementById('anaTag').textContent = token.analysis.tag;
  document.getElementById('anaMeaning').textContent = token.analysis.meaning;
  document.getElementById('anaNote').textContent = token.analysis.note;
  document.getElementById('analysisCard').style.display = 'block';
  document.getElementById('analysisCard').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function closeAnalysis() {
  activeTokenIdx = null;
  if (activeRuby) { activeRuby.classList.remove('word-active'); activeRuby = null; }
  document.getElementById('analysisCard').style.display = 'none';
}

function toggleTrans() {
  showTrans = !showTrans;
  document.getElementById('transBox').style.display = showTrans ? 'block' : 'none';
  document.getElementById('transToggleLabel').textContent = showTrans ? '隐藏中文译文' : '显示中文译文';
}

function loadUserText() {
  const raw = document.getElementById('userInput').value.trim();
  if (!raw) { alert('日本語のテキストを入力してください。'); return; }
  stopReading(); closeAnalysis();
  const tokens = [];
  const re = /([\u4e00-\u9faf\u3400-\u4dbf]+|[^\u4e00-\u9faf\u3400-\u4dbf]+)/g;
  let m;
  while ((m = re.exec(raw)) !== null) {
    const chunk = m[1];
    const isKanji = /[\u4e00-\u9faf]/.test(chunk);
    tokens.push({ text: chunk, kana: isKanji ? 'かんじ' : undefined });
  }
  const count = raw.length;
  let lvl = 0;
  if (count > 350) lvl = 3;
  else if (count > 150) lvl = 2;
  else if (count > 50) lvl = 1;
  currentArticle = { level: lvl, title: `ユーザー入力（${count}字）`, translation: '（AIによる自動解析モード）', tokens };
  document.getElementById('badgeLevel').textContent = LEVELS[lvl].name + '相当';
  document.getElementById('badgeCount').textContent = count + ' 字';
  document.getElementById('articleTitle').textContent = currentArticle.title;
  const container = document.getElementById('passageText');
  container.innerHTML = '';
  highlightedSpans = [];
  let si = 0;
  tokens.forEach(token => {
    const wrapper = document.createElement('span');
    wrapper.className = 'token-wrap';
    const ruby = document.createElement('ruby');
    const chars = [...token.text];
    chars.forEach(ch => {
      const cs = document.createElement('span');
      cs.className = 'char-span';
      cs.textContent = ch;
      cs.dataset.spanIdx = si++;
      ruby.appendChild(cs);
      highlightedSpans.push(cs);
    });
    const rt = document.createElement('rt');
    if (token.kana) { rt.textContent = token.kana; }
    else { rt.className = 'ghost'; rt.textContent = '\u200b'; }
    ruby.appendChild(rt);
    wrapper.appendChild(ruby);
    container.appendChild(wrapper);
  });
  document.getElementById('transText').textContent = currentArticle.translation;
  document.getElementById('userInput').value = '';
}

function updateSpeed(val) {
  speechRate = parseFloat(val);
  document.getElementById('speedVal').textContent = val + '×';
}

function toggleRead() {
  if (isReading) { stopReading(); return; }
  startReading();
}

function startReading() {
  if (!synth || !currentArticle) return;
  synth.cancel();
  const text = currentArticle.tokens.map(t => t.text).join('');
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = speechRate;
  utter.pitch = 1.05;
  const voices = synth.getVoices();
  const best = voices.find(v => v.lang.startsWith('ja') && (v.name.includes('Kyoko') || v.name.includes('Premium') || v.name.includes('Enhanced')))
               || voices.find(v => v.lang.startsWith('ja'));
  if (best) utter.voice = best;
  utter.onboundary = (e) => {
    const idx = e.charIndex;
    highlightedSpans.forEach((s, i) => {
      s.classList.toggle('reading-hi', i >= idx && i < idx + 2);
    });
  };
  utter.onend = utter.onerror = () => {
    isReading = false;
    highlightedSpans.forEach(s => s.classList.remove('reading-hi'));
    setReadBtn(false);
  };
  isReading = true;
  setReadBtn(true);
  setTimeout(() => synth.speak(utter), 50);
}

function stopReading() {
  synth && synth.cancel();
  isReading = false;
  highlightedSpans.forEach(s => s.classList.remove('reading-hi'));
  setReadBtn(false);
}

function setReadBtn(on) {
  document.getElementById('readBtn').className = 'read-btn ' + (on ? 'on' : 'off');
  document.getElementById('readIcon').textContent = on ? '⏹' : '▶';
  document.getElementById('readLabel').textContent = on ? '停止' : 'AI 朗読';
}

if (synth && synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = () => {};
}

document.addEventListener('DOMContentLoaded', () => { renderArticle(); });
document.addEventListener('click', (e) => {
  if (!e.target.closest('#analysisCard') && !e.target.closest('.word-clickable')) closeAnalysis();
});
</script>
</body>
