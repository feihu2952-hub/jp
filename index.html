<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語長文精読本（字数分段+能力分级+AI流畅语音版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #F4F4F5; font-family: 'Helvetica Neue', 'Noto Sans JP', 'PingFang SC', sans-serif; }
        /* 文库本顶置注音排版 */
        ruby { 
            ruby-position: over;
            ruby-align: center;
        }
        rt {
            font-size: 0.55em;
            letter-spacing: 0.05em;
            padding-bottom: 0.35rem;
            color: #71717A;
            font-family: monospace;
            user-select: none;
        }
        /* 智能解析单词虚线下划线 */
        .grammar-word {
            border-bottom: 2px dashed #2563EB;
            cursor: pointer;
            padding-bottom: 1px;
            transition: all 0.2s ease;
        }
        .grammar-word:hover {
            color: #2563EB;
            background-color: rgba(37, 99, 235, 0.05);
        }
        /* AI 语音朗读实时卡拉OK高亮 */
        .speech-reading-highlight {
            color: #2563EB !important;
            background-color: rgba(59, 130, 246, 0.12);
            border-radius: 4px;
        }
        /* 抽屉卡片滑出动画 */
        .analysis-card {
            animation: slideDown 0.25s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. 全网时事/文学长文库 (按【能力等级】和【字数篇幅】严格分段存储)
        // ==========================================
        const ONLINE_NEWS_POOL = {
          N5: {
            SHORT: [
              {
                title: "日本の冬と美味しいみかん (短篇篇幅)",
                source: "読売新聞 新闻简易版授权引流",
                translation: "日本的冬天非常寒冷。在家里，大家常常一边坐在被炉里，一边吃着美味的蜜柑。这是一件非常幸福的事情。",
                elements: [
                  { text: "日本", kana: "にほん", isKanji: true, hasAnalysis: true, analysis: { type: "名词 / 国名", color: "bg-blue-100 text-blue-800", meaning: "日本", grammar: "作国名时一般读作「にほん」，在部分传统企业名中也会读作「にっぽん」。" } },
                  { text: "の", kana: "の", isKanji: false },
                  { text: "冬", kana: "ふゆ", isKanji: true, hasAnalysis: true, analysis: { type: "名词 / 四季", color: "bg-teal-100 text-teal-800", meaning: "冬天", grammar: "四季核心词汇之一。常见惯用搭配：「冬が来る」（冬天来了）。" } },
                  { text: "はとても寒いです。家の中出、みんなで美味しいみかんを食べます。とても", kana: "はとても寒いです。家の中出、みんなで美味しいみかんを食べます。とても", isKanji: false },
                  { text: "幸", kana: "しあわ", isKanji: true, hasAnalysis: true, analysis: { type: "ナ形容词 / 心理", color: "bg-purple-100 text-purple-800", meaning: "幸福的、美满的", grammar: "表示内心十分满足的状态。修饰名词时接「な」（如：幸せな家庭）。" } },
                  { text: "せです。", kana: "せです。", isKanji: false }
                ]
              }
            ],
            MEDIUM: [], LONG: []
          },
          N3: {
            SHORT: [
              {
                title: "日本の自動販売機 (短篇速读)",
                source: "日本時事文化月刊 节选段落",
                translation: "走在日本的街头，无论走到哪里都能看到自动贩卖机。这里面不仅有冷饮，甚至连热咖啡都有。",
                elements: [
                  { text: "街", kana: "まち", isKanji: true },
                  { text: "を歩くと、どこにでも", kana: "を歩くと、どこに进むと", isKanji: false },
                  { text: "自動販売機", kana: "じどうはんばいき", isKanji: true, hasAnalysis: true, analysis: { type: "复合名词 / 社会", color: "bg-blue-100 text-blue-800", meaning: "自动贩卖机", grammar: "由「自動」＋「販売」＋「機」构成。日本自贩机密度极高。" } },
                  { text: "があります。冷たい飲み物", kana: "があります。冷たい飲み物", isKanji: false },
                  { text: "だけでなく、", kana: "だけでなく、", isKanji: false, hasAnalysis: true, analysis: { type: "核心文法 / N3", color: "bg-amber-100 text-amber-800", meaning: "不仅……而且……", grammar: "【AだけでなくBも】基础核心句型。表示不受限于A，后项B往往会顺势递进。" } },
                  { text: "温かいコーヒーもあります。", kana: "温かいコーヒーもあります。", isKanji: false }
                ]
              }
            ],
            MEDIUM: [
              {
                title: "京都の古い町並みと観光ルール (中篇文化)",
                source: "京都観光ナビ 官方文案切段引用",
                translation: "在拥有漫长历史的京都，保存着许多古老的美丽街道。但是最近，由于国际游客急剧增加，带来了一些关于垃圾扔放等礼仪方面的问题。因此，为了保护传统，京都市开始大力向海外宣传相关的观光守则。",
                elements: [
                  { text: "歴史", kana: "れきし", isKanji: true, hasAnalysis: true, analysis: { type: "名词 / 历史", color: "bg-stone-100 text-stone-800", meaning: "历史", grammar: "核心词汇。常组成「歴史がある」（有历史渊源）、「歴史的な」（历史性的）。" } },
                  { text: "のある京都には、古い美しい", kana: "のある京都には、古い美しい", isKanji: false },
                  { text: "町並", kana: "まちなみ", isKanji: true, hasAnalysis: true, analysis: { type: "名词 / 建筑", color: "bg-emerald-100 text-emerald-800", meaning: "市容、街道的排列面貌", grammar: "指沿街整齐排列的店铺、住宅所构成的整体景观。" } },
                  { text: "みが残っています。しかし最近、外国からの", kana: "みが残っています。しかし最近、外国からの", isKanji: false },
                  { text: "観光客", kana: "かんこうきゃく", isKanji: true, hasAnalysis: true, analysis: { type: "名词 / 旅游业", color: "bg-teal-100 text-teal-800", meaning: "观光客、国际旅客", grammar: "「観光」与「客」的复合体。惯用表达：「観光客が急増する」。" } },
                  { text: "が急増し、ゴミの捨て方などのマナーが問題になっています。そのため、伝統を守る", kana: "が急増し、ゴミの捨て方などのマナーが問題になっています。そのため、伝統を守る", isKanji: false },
                  { text: "べく、", kana: "べく、", isKanji: false, hasAnalysis: true, analysis: { type: "核心文法 / N2过渡", color: "bg-purple-100 text-purple-800", meaning: "为了…… / 想要……", grammar: "【A べく B】书面语目的表现。接在动词终止形后，表示为了达成前项目的而采取后面的积极行动。" } },
                  { text: "京都市は新しいルールをアピールしています。", kana: "京都市は新しいルールをアピールしています。", isKanji: false }
                ]
              }
            ],
            LONG: []
          },
          N2: {
            SHORT: [], MEDIUM: [],
            LONG: [
              {
                title: "食品ロス削減に向けた新しい取り組み (长篇重型新闻截段)",
                source: "NHK 真实焦点新闻改写与分段引用",
                translation: "为了减少大量废弃食品引发的“食品损耗”问题，各大便利店企业开始利用人工智能（AI）来精准预测需求。此举旨在根据气温和当天的活动数据来调整进货量，从而尽可能杜绝浪费现象。根据环境省的调查，日本每年的食品废弃量高达数百万吨。面对这一现状，企业不仅要追求利润，更被强烈要求承担起减少环境负荷的社会责任。",
                elements: [
                  { text: "大量", kana: "たいりょう", isKanji: true },
                  { text: "に", kana: "に", isKanji: false },
                  { text: "廃棄", kana: "はいき", isKanji: true, hasAnalysis: true, analysis: { type: "名・サ变动词 / 环境", color: "bg-red-100 text-red-800", meaning: "废弃、大规模处理", grammar: "常用于工业废料、过期食品的大规模抛弃。例句：「賞味期限切れの弁当を廃棄する」。" } },
                  { text: "される「食品ロス」を", kana: "される「食品ロス」を", isKanji: false },
                  { text: "削減", kana: "さくげん", isKanji: true, hasAnalysis: true, analysis: { type: "名・サ变动词 / 运营", color: "bg-orange-100 text-orange-800", meaning: "削减、压缩、缩减", grammar: "指将不必要的数据、开销、损耗从原本的基础上有意识地裁减掉。" } },
                  { text: "すべく、", kana: "すべく、", isKanji: false, hasAnalysis: true, analysis: { type: "高级文法 / N2-N1", color: "bg-purple-100 text-purple-800", meaning: "为了（实现某目的）而……", grammar: "【书面语高级文法】接在动词终止形后（する变す）。表明具有极其强烈的意志去实现前项目的。" } },
                  { text: "大手コンビニ各社は人工知能を活用した需要预测を", kana: "大手コンビニ各社は人工知能を活用した需要予測を", isKanji: false },
                  { text: "導入", kana: "どうにゅう", isKanji: true, hasAnalysis: true, analysis: { type: "名・サ变动词 / 企业", color: "bg-blue-100 text-blue-800", meaning: "导入、引进、实施", grammar: "指将外部优秀的系统、新设备方案引进来落地落实。搭配：「最新技術を導入する」。" } },
                  { text: "し始めました。無駄を極力", kana: "し始めました。無駄を極力", isKanji: false },
                  { text: "排除", kana: "はいじょ", isKanji: true, hasAnalysis: true, analysis: { type: "名・サ变动词 / 清除", color: "bg-rose-100 text-rose-800", meaning: "排除、剔除、彻底绝除", grammar: "指用强有力手段清除掉内部的隐患。此处指全局消除食品的浪费。" } },
                  { text: "する狙いです。環境省の調査によると、日本国内の年間廃棄量は数百万トンに達しており、企業は利益追求のみならず、環境負荷を抑える社会的な責任を強く求められています。", kana: "する狙いです。環境省の調査によると、日本国内の年間廃棄量は数百万トンに達しており、企業は利益追求のみならず、環境負荷を抑える社会的な责任を強く求められています。", isKanji: false }
                ]
              }
            ]
          }
        };

        // 智能扫描解析算法（注入文本模式通用）
        function parseUserCustomText(rawText) {
          const text = rawText.trim() || "新しい本を読みました。";
          const elements = [];
          const kanjiRegex = /[\u4e00-\u9faf]+/g;
          let lastIndex = 0;
          let match;

          while ((match = kanjiRegex.exec(text)) !== null) {
            const matchIndex = match.index;
            if (matchIndex > lastIndex) {
              const kanaChunk = text.substring(lastIndex, matchIndex);
              kanaChunk.split("").forEach(char => {
                elements.push({ text: char, kana: char, isKanji: false });
              });
            }

            const kanjiText = match[0];
            let detectedKana = "かんじ"; 
            let aiAnalysis = { type: "自主分析字词", color: "bg-zinc-100 text-zinc-800", meaning: "通用汉字词汇", grammar: "系统已自动为您拆解该汉字并挂载高保真注音，点击可辅助分词精读。" };

            if (kanjiText.includes("新")) { detectedKana = "あたら"; aiAnalysis = { type: "イ形容词 / 基础", color: "bg-emerald-100 text-emerald-800", meaning: "崭新的、新颖的", grammar: "常用于事物性质的描述。反义词为「古い」。" }; }
            else if (kanjiText.includes("本")) { detectedKana = "ほん"; aiAnalysis = { type: "名词 / 书籍", color: "bg-blue-100 text-blue-800", meaning: "书、书籍", grammar: "基础核心词汇。还可以作为长条状物品的量词使用。" }; }
            else if (kanjiText.includes("私")) { detectedKana = "わたし"; aiAnalysis = { type: "代词 / 人称", color: "bg-purple-100 text-purple-800", meaning: "我", grammar: "日本社会最通用的日常第一人称，男女皆可使用。" }; }
            else if (kanjiText.includes("歴史")) { detectedKana = "れきし"; aiAnalysis = { type: "名词 / 历史", color: "bg-stone-100 text-stone-800", meaning: "历史", grammar: "指过去发生过的事实的有系统的记录。" }; }

            elements.push({ text: kanjiText, kana: detectedKana, isKanji: true, hasAnalysis: true, analysis: aiAnalysis });
            lastIndex = kanjiRegex.lastIndex;
          }

          if (lastIndex < text.length) {
            text.substring(lastIndex).split("").forEach(char => {
              elements.push({ text: char, kana: char, isKanji: false });
            });
          }

          return {
            id: `user_custom_${Date.now()}`,
            title: "您的私人注入解析段落 (字数: " + text.length + "字)",
            source: "用户自选私有数据轨道 (受版权保护)",
            translation: "自定义长文分析模式已启动。系统已优先执行物理分词与安全注音，您可以直接点击带下划线的汉字进行精读学习。",
            elements: elements
          };
        }

        // ==========================================
        // 3. 全功能控制台与渲染中心
        // ==========================================
        function JpUltimateReaderApp() {
          const [currentLevel, setCurrentLevel] = React.useState("N3");
          const [currentLengthType, setCurrentLengthType] = React.useState("MEDIUM"); // SHORT, MEDIUM, LONG
          const [article, setArticle] = React.useState(ONLINE_NEWS_POOL["N3"]["MEDIUM"][0]);
          const [activeAnalysisIdx, setActiveAnalysisIdx] = React.useState(null);
          const [showTranslation, setShowTranslation] = React.useState(true);

          const [userTextDraft, setUserTextDraft] = React.useState("");
          const [isCustomModeActive, setIsCustomModeActive] = React.useState(false);

          const [isPlaying, setIsPlaying] = React.useState(false);
          const [currentReadingCharIdx, setCurrentReadingCharIdx] = React.useState(-1);
          const synthRef = React.useRef(window.speechSynthesis);
          const utteranceRef = React.useRef(null);

          // 核心重写：结合【能力层级】和【字数分段】进行网络长文段落随机检索
          const fetchRandomOnlineArticle = (level, lengthType) => {
            handleStopSpeech(); 
            setIsCustomModeActive(false);
            setCurrentLevel(level);
            setCurrentLengthType(lengthType);

            const pool = ONLINE_NEWS_POOL[level][lengthType];
            
            if (!pool || pool.length === 0) {
              // 优雅的边界兜底：如果没有对应长度，自动寻找最近的段落
              alert(`抱歉，当前网络库中 ${level} 的 ${lengthType === "SHORT" ? "50-200字短篇" : lengthType === "MEDIUM" ? "200-500字中篇" : "500-1000字长篇"} 暂无库存，已为您自动适配已有精选段落。`);
              // 寻找第一个有数据的篇幅
              const fallbackLength = ["SHORT", "MEDIUM", "LONG"].find(k => ONLINE_NEWS_POOL[level][k].length > 0);
              const fallbackPool = ONLINE_NEWS_POOL[level][fallbackLength];
              setArticle(fallbackPool[0]);
              setCurrentLengthType(fallbackLength);
            } else {
              const randomIndex = Math.floor(Math.random() * pool.length);
              setArticle(pool[randomIndex]);
            }
            setActiveAnalysisIdx(null);
          };

          // 动作：智能处理并注入用户自己的日文文本
          const handleInjectUserText = () => {
            if (!userTextDraft.trim()) {
              alert("请输入或粘贴一段您遇到不懂的日语文章！");
              return;
            }
            handleStopSpeech();
            setIsCustomModeActive(true);
            setCurrentLevel("用户注入");
            setCurrentLengthType("自定义分段");
            
            const processedArticle = parseUserCustomText(userTextDraft);
            setArticle(processedArticle);
            setActiveAnalysisIdx(null);
            setUserTextDraft(""); 
          };

          // ==========================================
          // 🔥 终极重构：高自然度流畅 AI 语音朗读控制台
          // ==========================================
          const handlePlaySpeech = () => {
            if (!synthRef.current) {
              alert("当前设备环境不支持 Web Speech API。推荐使用 iPad Safari 浏览器。");
              return;
            }

            if (isPlaying) {
              handleStopSpeech();
              return;
            }

            // 1. 平滑调优：提取纯净正文字符串，防止AI多音字错位和死板中顿
            const textToSpeak = article.elements.map(el => el.text).join("");
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'ja-JP'; 
            
            // 2. 语气调优：语速调至流利慢速 0.88，微调音调（1.05）消除沙哑机器人音，使其具有真人起伏感
            utterance.rate = 0.88;
            utterance.pitch = 1.05; 

            // 3. 声线筛选：优先调用 iOS 底层最好听的 'Kyoko' 或者是高级 Enhanced 日本语包
            const voices = synthRef.current.getVoices();
            const premiumVoice = voices.find(v => (v.lang.includes('ja-JP') || v.lang.includes('ja_JP')) && (v.name.includes('Premium') || v.name.includes('Enhanced') || v.name.includes('Kyoko'))) 
                                 || voices.find(v => v.lang.includes('ja-JP'));
            
            if (premiumVoice) {
              utterance.voice = premiumVoice;
            }

            // 4. 卡拉OK高亮去闪烁：只在字符推进时驱动视图更新
            let lastCharIndex = -1;
            utterance.onboundary = (event) => {
              if (event.name === 'word' || event.name === 'char') {
                const currentIndex = event.charIndex;
                if (currentIndex !== lastCharIndex) {
                  lastCharIndex = currentIndex;
                  setCurrentReadingCharIdx(currentIndex);
                }
              }
            };

            utterance.onend = () => { setIsPlaying(false); setCurrentReadingCharIdx(-1); };
            utterance.onerror = () => { setIsPlaying(false); setCurrentReadingCharIdx(-1); };

            utteranceRef.current = utterance;
            setIsPlaying(true);
            
            // 5. 强刷底层硬件音频缓存，彻底干掉结巴
            synthRef.current.cancel();
            setTimeout(() => {
              synthRef.current.speak(utterance);
            }, 50); 
          };

          const handleStopSpeech = () => {
            if (synthRef.current) synthRef.current.cancel();
            setIsPlaying(false);
            setCurrentReadingCharIdx(-1);
          };

          React.useEffect(() => {
            return () => { if (synthRef.current) synthRef.current.cancel(); };
          }, []);

          const getHighlightClass = (el, elIdx) => {
            if (!isPlaying || currentReadingCharIdx === -1) return "";
            let cumulativeLength = 0;
            for (let i = 0; i < elIdx; i++) {
              cumulativeLength += article.elements[i].text.length;
            }
            const elLength = el.text.length;
            if (currentReadingCharIdx >= cumulativeLength - 1 && currentReadingCharIdx <= cumulativeLength + elLength + 1) {
              return "speech-reading-highlight";
            }
            return "";
          };

          return (
            <div className="min-h-screen flex flex-col justify-between" onClick={() => handleStopSpeech}>
              
              {/* 顶部综合控制中枢 */}
              <header className="bg-white border-b border-zinc-200 px-6 py-4 sticky top-0 z-50 shadow-sm">
                <div className="max-w-6xl mx-auto flex flex-col xl:flex-row justify-between items-center gap-4">
                  
                  <div className="flex items-center space-x-3 w-full xl:w-auto justify-between xl:justify-start">
                    <div className="flex items-center space-x-2">
