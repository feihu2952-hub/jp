    <style>
        body { background-color: #F8F6F1; font-family: 'Noto Sans JP', 'PingFang SC', sans-serif; }
        ruby { ruby-position: over; }
        /* 拟真文库本光标动画 */
        .typing-cursor {
            border-bottom: 3px solid #1E3A5F;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { border-color: #1E3A5F; }
            50% { border-color: transparent; }
        }
    </style>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. 内置多难度文章库
        // ==========================================
        const SAMPLE_ARTICLES = [

            category: "文化",

            elements: [

              { text: "の", kana: "の", isKanji: false },
              { text: "桜", kana: "さくら", isKanji: true, meaning: "樱花" },
              { text: "の", kana: "の", isKanji: false },
              { text: "開花", kana: "かいか", isKanji: true, meaning: "开花" },
              { text: "は", kana: "は", isKanji: false },
              { text: "平年", kana: "へいねん", isKanji: true, meaning: "往年" },
              { text: "より", kana: "より", isKanji: false },
              { text: "早い", kana: "はやい", isKanji: true, meaning: "早的" },
              { text: "予想", kana: "よそう", isKanji: true, meaning: "预测" },
              { text: "です", kana: "です", isKanji: false },
              { text: "。", kana: "。", isKanji: false },
              { text: "気象庁", kana: "きしょうちょう", isKanji: true, meaning: "气象厅" },
              { text: "に", kana: "に", isKanji: false },
              { text: "よると", kana: "よると", isKanji: false },
              { text: "春", kana: "はる", isKanji: true, meaning: "春天" },
              { text: "の", kana: "の", isKanji: false },
              { text: "気温", kana: "きおん", isKanji: true, meaning: "气温" },
              { text: "が", kana: "が", isKanji: false },
              { text: "高い", kana: "たかい", isKanji: true, meaning: "高的" },
              { text: "ため", kana: "ため", isKanji: false },
              { text: "、", kana: "、", isKanji: false },
              { text: "準備", kana: "じゅんび", isKanji: true, meaning: "准备" },
              { text: "が", kana: "が", isKanji: false },
              { text: "必要", kana: "ひつよう", isKanji: true, meaning: "必要" },
              { text: "です", kana: "です", isKanji: false },

            ]
          },
          {

            elements: [
              { text: "新しい", kana: "あたらしい", isKanji: true, meaning: "新的" },
              { text: "電池", kana: "でんち", isKanji: true, meaning: "电池" },
              { text: "の", kana: "の", isKanji: false },
              { text: "技術", kana: "ぎじゅつ", isKanji: true, meaning: "技术" },
              { text: "を", kana: "を", isKanji: false },
              { text: "開発", kana: "かいhatsu", kana: "かいはつ", isKanji: true, meaning: "开发" },
              { text: "しました", kana: "しました", isKanji: false },
              { text: "。", kana: "。", isKanji: false },
              { text: "経済", kana: "けいざい", isKanji: true, meaning: "经济" },
              { text: "への", kana: "への", isKanji: false },
              { text: "影響", kana: "えいきょう", isKanji: true, meaning: "影响" },
              { text: "も", kana: "も", isKanji: false },
              { text: "大きい", kana: "おおきい", isKanji: true, meaning: "大的" },
              { text: "見込み", kana: "みこみ", isKanji: true, meaning: "预估" },
              { text: "です", kana: "です", isKanji: false },

            ]
          },
          {
            id: "art_003",
            title: "いっしょに お茶を 飲みませんか",
            level: "N5",
            category: "生活",
            duration: 1,
            translation: "要不要一起喝杯茶呢？上周我从朋友那里得到了非常美味的茶。星期天如果有空的话，请一定来我家玩吧。",
            elements: [
              { text: "友達", kana: "ともだち", isKanji: true, meaning: "朋友" },
              { text: "に", kana: "に", isKanji: false },
              { text: "美味しい", kana: "おいしい", isKanji: true, meaning: "美味的" },
              { text: "お茶", kana: "おちゃ", isKanji: true, meaning: "茶" },
              { text: "を", kana: "を", isKanji: false },
              { text: "もらいました", kana: "もらいました", isKanji: false },
              { text: "。", kana: "。", isKanji: false },
              { text: "日曜日", kana: "にちようび", isKanji: true, meaning: "星期天" },
              { text: "に", kana: "に", isKanji: false },
              { text: "一緒", kana: "いっしょ", isKanji: true, meaning: "一起" },
              { text: "に", kana: "に", isKanji: false },
              { text: "飲みませんか", kana: "のみませんか", isKanji: true, meaning: "不喝吗" },
              { text: "。", kana: "。", isKanji: false }
            ]
          }
        ];

        const ROMAJI_MAP = {
          a: "あ", i: "い", u: "う", e: "え", o: "お",
          ka: "か", ki: "き", ku: "く", ke: "け", ko: "こ",
          sa: "さ", si: "し", su: "す", se: "せ", so: "そ", shi: "し",
          ta: "た", ti: "ち", tu: "つ", te: "て", to: "と", chi: "ち", tsu: "つ",
          na: "な", ni: "に", nu: "ぬ", ne: "ね", no: "の",
          ha: "は", hi: "ひ", fu: "ふ", he: "へ", ho: "ほ", hu: "ふ",
          ma: "ま", mi: "み", mu: "む", me: "め", mo: "も",
          ya: "や", yu: "ゆ", yo: "よ",
          ra: "ら", ri: "り", ru: "る", re: "れ", ro: "ろ",
          wa: "わ", wo: "を", nn: "ん", n: "ん",
          ga: "が", gi: "ぎ", gu: "ぐ", ge: "げ", go: "ご",
          za: "ざ", zi: "じ", zu: "ず", ze: "ぜ", zo: "ぞ", ji: "じ",
          da: "だ", di: "ぢ", du: "づ", de: "で", do: "ど",
          ba: "ば", bi: "び", bu: "ぶ", be: "べ", bo: "ぼ",
          pa: "ぱ", pi: "ぴ", pu: "ぷ", pe: "ぺ", po: "ぽ",
          kya: "きゃ", kyu: "きゅ", kyo: "きょ",
          sha: "しゃ", shu: "しゅ", sho: "しょ", sya: "しゃ", syu: "しゅ", syo: "しょ",
          cha: "ちゃ", chu: "ちゅ", cho: "ちょ", cya: "ちゃ", cyu: "ちゅ", cyo: "ちょ",
          nya: "にゃ", nyu: "にょ", nyo: "にょ",
          hya: "ひゃ", hyu: "ひゃ", hyo: "ひょ",
          mya: "みゃ", myu: "みゃ", myo: "みょ",
          rya: "りゃ", ryu: "りょ", ryo: "りょ",
          gya: "ぎゃ", gyu: "ぎゅ", gyo: "ぎょ",
          ja: "じゃ", ju: "じゅ", jo: "じょ", zya: "じゃ", zyu: "じゅ", zyo: "じょ",
          bya: "びゃ", byu: "びゅ", byo: "びょ",
          pya: "ぴゃ", pyu: "ぴゅ", pyo: "ぴょ"
        };

        function convertRomajiToKana(romaji) {
          let buffer = romaji.toLowerCase();
          let result = "";
          while (buffer.length > 0) {
            let matched = false;
            for (let len = Math.min(3, buffer.length); len > 0; len--) {
              const chunk = buffer.substring(0, len);
              if (ROMAJI_MAP[chunk]) {
                result += ROMAJI_MAP[chunk];
                buffer = buffer.substring(len);
                matched = true;
                break;
              }
            }
            if (!matched && buffer.length >= 2 && buffer[0] === buffer[1] && buffer[0] >= 'a' && buffer[0] <= 'z' && buffer[0] !== 'n') {
              result += "っ";
              buffer = buffer.substring(1);
              matched = true;
            }
            if (!matched) break;
          }
          return { kana: result, remainder: buffer };
        }

        // ==========================================
        // 2. 主程序组件
        // ==========================================
        function JapaneseTypingTrainer() {
          const [view, setView] = React.useState("practice");
          const [challengeMode, setChallengeMode] = React.useState(false);
          
          // 难度选择状态：'ALL' 代表全选，或者指定 'N5', 'N4', 'N3' 等
          const [selectedLevel, setSelectedLevel] = React.useState("ALL");
          
          const [article, setArticle] = React.useState(SAMPLE_ARTICLES[0]);
          const [recentArticles, setRecentArticles] = React.useState([]);
          
          // 彻底重构的单字/单假名定位级核心状态
          const [currentElementIdx, setCurrentElementIdx] = React.useState(0);
          const [charProgressInElement, setCharProgressInElement] = React.useState(0); // 在当前词组里打到了第几个假名
          const [inputBuffer, setInputBuffer] = React.useState("");
          const [isError, setIsError] = React.useState(false); // 当前敲击是否错误

          // 统计
          const [startTime, setStartTime] = React.useState(null);
          const [totalCorrectChars, setTotalCorrectChars] = React.useState(0);
          const [mistakeCount, setMistakeCount] = React.useState(0);
          const [wpm, setWpm] = React.useState(0);
          const [accuracy, setAccuracy] = React.useState(100);

          const [userData, setUserData] = React.useState({
            completedArticles: [],
            mistakeWords: [],
            streakDays: 1,
            totalChars: 0
          });

          const inputRef = React.useRef(null);

          // 初始化加载 LocalStorage
          React.useEffect(() => {
            const saved = localStorage.getItem("jp_typing_trainer_data");
            if (saved) {
              try { setUserData(JSON.parse(saved)); } catch (e) { console.error(e); }
            }
          }, []);

          const saveUserData = (newData) => {
            setUserData(newData);
            localStorage.setItem("jp_typing_trainer_data", JSON.stringify(newData));
          };

          // 计时看板
          React.useEffect(() => {
            if (!startTime || totalCorrectChars === 0) return;
            const interval = setInterval(() => {
              const elapsedMinutes = (Date.now() - startTime) / 60000;
              if (elapsedMinutes > 0) {
                setWpm(Math.round((totalCorrectChars / 5) / elapsedMinutes));
              }
              const totalAttempts = totalCorrectChars + mistakeCount;
              setAccuracy(totalAttempts > 0 ? Math.round((totalCorrectChars / totalAttempts) * 100) : 100);
            }, 1000);
            return () => clearInterval(interval);
          }, [startTime, totalCorrectChars, mistakeCount]);

          const focusHiddenInput = () => {
            if (inputRef.current) inputRef.current.focus();
          };

          React.useEffect(() => {
            focusHiddenInput();
          }, [currentElementIdx, charProgressInElement, view]);

          // 根据当前选中的难度，切换下一篇文章
          const switchRandomArticle = (forcedLevel = selectedLevel) => {
            let pool = SAMPLE_ARTICLES;
            if (forcedLevel !== "ALL") {
              pool = SAMPLE_ARTICLES.filter(art => art.level === forcedLevel);
            }
            
            if (pool.length === 0) {
              alert(`抱歉，目前题库中暂无 ${forcedLevel} 难度的文章，已为你自动展示全部。`);
              pool = SAMPLE_ARTICLES;
              setSelectedLevel("ALL");
            }

            const available = pool.filter(art => !recentArticles.includes(art.id));
            const finalPool = available.length > 0 ? available : pool;
            const randomArt = finalPool[Math.floor(Math.random() * finalPool.length)];
            
            setArticle(randomArt);
            resetTrainer();
          };

          // 切换顶层难度选择
          const handleLevelChange = (level) => {
            setSelectedLevel(level);
            switchRandomArticle(level);
          };

          const resetTrainer = () => {
            setCurrentElementIdx(0);
            setCharProgressInElement(0);
            setInputBuffer("");
            setIsError(false);
            setStartTime(null);
            setTotalCorrectChars(0);
            setMistakeCount(0);
            setWpm(0);
            setAccuracy(100);
          };

          const targetElement = article.elements[currentElementIdx];
          // 当前需要输入的那个精准假名字符
          const targetChar = targetElement ? targetElement.kana[charProgressInElement] : "";

          // 核心键盘逻辑：精确到单个字的光标流控制
          const handleInputChange = (e) => {
            if (!startTime) setStartTime(Date.now());
            const value = e.target.value;
            setInputBuffer(value);
            setIsError(false);

            // 将当前累积输入的罗马字转换为假名
            const { kana, remainder } = convertRomajiToKana(value);

            if (kana.length > 0) {
              // 拿转换出来的假名跟当前位置的目标假名做对比
              if (targetChar && kana === targetChar) {
                // 打对了！光标向前跳一格
                setTotalCorrectChars(prev => prev + 1);
                setInputBuffer(remainder); // 消费掉已经敲对的罗马字字母
                
                const nextProgress = charProgressInElement + 1;
                if (nextProgress < targetElement.kana.length) {
                  // 当前词组还没打完，继续下一个字
                  setCharProgressInElement(nextProgress);
                } else {
                  // 当前词组（汉字）打完了，跳到下一个大词组块
                  if (currentElementIdx < article.elements.length - 1) {
                    setCurrentElementIdx(prev => prev + 1);
                    setCharProgressInElement(0);
                    setInputBuffer("");
                  } else {
                    // 全文结束
                    handleArticleCompletion();
                  }
                }
              } else {
                // 打错了！触发红色警报，且不准跳到下一个字
                setIsError(true);
                setMistakeCount(prev => prev + 1);
                if (targetElement.isKanji) {
                  logMistake(targetElement.text, targetElement.kana, targetElement.meaning || "暂无释义");
                }
              }
            }
          };

          const logMistake = (kanji, kana, meaning) => {
            const list = [...userData.mistakeWords];
            const existing = list.find(item => item.kanji === kanji);
            if (existing) {
              existing.count += 1;
              existing.lastMistakeTime = Date.now();
            } else {
              list.push({ kanji, kana, meaning, count: 1, lastMistakeTime: Date.now(), level: article.level });
            }
            saveUserData({ ...userData, mistakeWords: list });
          };

          const handleArticleCompletion = () => {
            const completed = [...userData.completedArticles, article.id];
            const updatedRecent = [...recentArticles, article.id].slice(-20);
            setRecentArticles(updatedRecent);
            
            saveUserData({
              ...userData,
              completedArticles: completed,
              totalChars: userData.totalChars + totalCorrectChars
            });

            alert("🎉 恭喜你读完了整篇长文！打字正确率非常棒！");
            resetTrainer();
            switchRandomArticle(selectedLevel);
          };

          const startMistakeReview = (word) => {
            const customArticle = {
              id: `review_${Date.now()}`,
              title: `专项突破: ${word.kanji}`,
              level: word.level,
              category: "生活",
              duration: 1,
              translation: `针对错词【${word.kanji}】建立的专项突击练习。`,
              elements: [
                { text: word.kanji, kana: word.kana, isKanji: true, meaning: word.meaning },
                { text: "の", kana: "の", isKanji: false },
                { text: "練習", kana: "れんしゅう", isKanji: true, meaning: "练习" }
              ]
            };
            setArticle(customArticle);
            setView("practice");
            resetTrainer();
          };

          return (
            <div className="min-h-screen text-[#1E3A5F] font-sans antialiased transition-colors duration-200">
              {/* 顶部横头面板 */}
              <header className="border-b border-[#E6E1D6] px-6 py-4 flex flex-wrap justify-between items-center max-w-5xl mx-auto gap-4">
                <div className="flex items-center space-x-3">
                  <span className="text-xl font-bold tracking-wide text-[#1E3A5F]">日本語縦横</span>
                  <span className="text-xs px-2 py-0.5 bg-emerald-100 text-emerald-800 rounded-full font-medium">精准光标版</span>
                </div>
                
                {/* 新增：多难度快速筛选组件 */}
                <div className="flex items-center bg-white border border-[#E6E1D6] rounded-lg p-1 space-x-1 text-xs">
                  <span className="text-[#5A6B84] px-2 font-medium">选择难度:</span>
                  {["ALL", "N5", "N3", "N2"].map((lvl) => (
                    <button
                      key={lvl}
                      onClick={() => handleLevelChange(lvl)}
                      className={`px-3 py-1 rounded transition-all ${selectedLevel === lvl ? "bg-[#1E3A5F] text-white font-bold" : "text-[#5A6B84] hover:bg-[#F8F6F1]"}`}
                    >
                      {lvl === "ALL" ? "全选" : lvl}
                    </button>
                  ))}
                </div>

                <nav className="flex space-x-2">
                  <button onClick={() => setView("practice")} className={`px-4 py-1.5 text-sm rounded-md transition-all ${view === "practice" ? "bg-[#1E3A5F] text-white shadow-sm" : "text-[#5A6B84] hover:text-[#1E3A5F]"}`}>长文练习</button>
                  <button onClick={() => setView("mistakes")} className={`px-4 py-1.5 text-sm rounded-md transition-all ${view === "mistakes" ? "bg-[#1E3A5F] text-white shadow-sm" : "text-[#5A6B84] hover:text-[#1E3A5F]"}`}>易错词 ({userData.mistakeWords.length})</button>
                </nav>
              </header>

              <main className="max-w-4xl mx-auto px-4 py-8 md:py-12" onClick={focusHiddenInput}>
                {view === "practice" ? (
                  <div>
                    {/* 文章标题区 */}
                    <div className="mb-6 flex flex-wrap items-center justify-between gap-4 border-b border-[#E6E1D6] pb-4">
                      <div>
                        <h1 className="text-2xl font-semibold tracking-tight text-[#1E3A5F] mb-2">{article.title}</h1>
                        <div className="flex items-center space-x-3 text-xs text-[#5A6B84]">
                          <span className="px-2 py-0.5 bg-[#1E3A5F]/5 rounded text-[#1E3A5F] font-bold">{article.level}</span>
                          <span>•</span><span>分类: {article.category}</span><span>•</span><span>预计时间: {article.duration} 分钟</span>
                        </div>
                      </div>
                      <div className="flex items-center space-x-2">
                        <button onClick={(e) => { e.stopPropagation(); setChallengeMode(!challengeMode); }} className={`text-xs px-3 py-1.5 rounded border transition-colors ${challengeMode ? "bg-[#C65D5D]/10 border-[#C65D5D] text-[#C65D5D]" : "bg-white border-[#E6E1D6] text-[#5A6B84]"}`}>{challengeMode ? "挑战模式 (隐翻译)" : "学习模式 (显翻译)"}</button>
                        <button onClick={(e) => { e.stopPropagation(); switchRandomArticle(selectedLevel); }} className="text-xs px-3 py-1.5 bg-white border border-[#E6E1D6] rounded text-[#1E3A5F] hover:bg-white/60">随机切题 ↻</button>
                      </div>
                    </div>

                    {/* 仪表盘 */}
                    <div className="grid grid-cols-5 gap-2 md:gap-4 mb-6 bg-white/60 backdrop-blur p-4 rounded-xl shadow-sm border border-[#E6E1D6]/60 text-center">
                      <div><p className="text-xs text-[#5A6B84] uppercase tracking-wider mb-1">WPM</p><p className="text-lg md:text-xl font-bold font-mono">{wpm}</p></div>
                      <div><p className="text-xs text-[#5A6B84] uppercase tracking-wider mb-1">已打对</p><p className="text-lg md:text-xl font-bold font-mono text-emerald-700">{totalCorrectChars} 字符</p></div>
                      <div><p className="text-xs text-[#5A6B84] uppercase tracking-wider mb-1">正确率</p><p className="text-lg md:text-xl font-bold font-mono">{accuracy}%</p></div>
                      <div><p className="text-xs text-[#5A6B84] uppercase tracking-wider mb-1">错击数</p><p className="text-lg md:text-xl font-bold font-mono text-[#C65D5D]">{mistakeCount}</p></div>
                      <div><p className="text-xs text-[#5A6B84] uppercase tracking-wider mb-1">坚持天数</p><p className="text-lg md:text-xl font-bold font-mono text-amber-700">{userData.streakDays}天</p></div>
                    </div>

                    {/* 核心打字阅读纸张区 */}
                    <div className="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-[#E6E1D6] leading-relaxed mb-6 select-none relative">
                      
                      {/* 隐藏的软键盘捕获框 */}
                      <input ref={inputRef} type="text" value={inputBuffer} onChange={handleInputChange} className="absolute opacity-0 pointer-events-none inset-0 w-full h-full z-0 cursor-default" autoComplete="off" autoCapitalize="off" spellCheck="false" autoCorrect="off" />
                      
                      {/* 颗粒级高亮文本流 */}
                      <div className="text-xl md:text-2xl tracking-widest text-[#1E3A5F] z-10 relative flex flex-wrap content-start items-center gap-y-8">
                        {article.elements.map((el, elIdx) => {
                          let elementStyle = "text-gray-400"; // 默认未打到的词显示灰色
                          
                          if (elIdx < currentElementIdx) {
                            elementStyle = "text-emerald-600 font-medium"; // 历史已打完的词变绿
                          }

                          // 关键：如果正处于当前正在输入的词组，进入精细化渲染
                          if (elIdx === currentElementIdx) {
                            return (
                              <span key={elIdx} className={`inline-block px-1 rounded transition-all duration-150 bg-slate-50 ring-1 ring-slate-200/60`}>
                                <ruby>
                                  {/* 原文汉字/假名展示 */}
                                  <span>{el.text}</span>
                                  {/* 上方振假名：根据用户在这个词组内部打到了哪一个假名，进行单个字精细拆解 */}
                                  <rt className="text-xs tracking-normal font-mono select-none pb-1 block">
                                    {el.kana.split("").map((char, charIdx) => {
                                      let charStyle = "text-[#5A6B84]"; // 还未打到的假名颜色
                                      let cursorClass = "";

                                      if (charIdx < charProgressInElement) {
                                        charStyle = "text-emerald-600 font-bold"; // 打对的单个假名变绿
                                      } else if (charIdx === charProgressInElement) {
                                        // 刚好是当前光标所在的那个字！
                                        charStyle = isError ? "text-white bg-[#C65D5D] px-0.5 rounded font-bold" : "text-[#1E3A5F] font-black"; 
                                        cursorClass = isError ? "" : "typing-cursor"; // 打错变红，打对则闪烁光标
                                      }

                                      return (
                                        <span key={charIdx} className={`${charStyle} ${cursorClass} mx-px px-0.5`}>
                                          {char}
                                        </span>
                                      );
                                    })}
                                  </rt>
                                </ruby>
                              </span>
                            );
                          }

                          // 其他普通状态词组的正常渲染
                          return (
                            <span key={elIdx} className={`inline-block px-0.5 transition-all ${elementStyle}`}>
                              <ruby>
                                {el.text}
                                <rt className="text-xs tracking-normal font-normal text-[#5A6B84]/70 select-none pb-1">{el.kana}</rt>
                              </ruby>
                            </span>
                          );
                        })}
                      </div>

                      {/* 底部输入引导反馈条 */}
                      <div className="mt-10 pt-4 border-t border-[#F8F6F1] flex flex-wrap items-center justify-between text-sm text-[#5A6B84] gap-2">
                        <div className="flex items-center space-x-2">
                          <span className={`w-2.5 h-2.5 rounded-full ${isError ? "bg-[#C65D5D] animate-ping" : "bg-[#1E3A5F] animate-pulse"}`} />
                          <span>盯准当前这个字: <span className="font-bold font-mono text-base bg-slate-100 px-2 py-0.5 rounded text-[#1E3A5F]">{targetChar || "无"}</span></span>
                        </div>
                        <div className="flex items-center space-x-2 text-xs">
                          {isError && <span className="text-[#C65D5D] font-bold bg-[#C65D5D]/10 px-2 py-0.5 rounded">罗马字拼写不匹配，请重新输入！</span>}
                          {inputBuffer && <span className="bg-[#F8F6F1] px-2 py-1 rounded font-mono">当前已敲键: <strong className="text-[#1E3A5F]">{inputBuffer}</strong></span>}
                        </div>
                      </div>
                    </div>

                    {/* 中文对照 */}
                    {!challengeMode && (
                      <div className="bg-[#5A6B84]/5 p-5 rounded-xl border border-[#E6E1D6]/40 text-sm leading-relaxed text-[#5A6B84]">
                        <p className="font-semibold text-xs uppercase tracking-wider mb-2 text-[#1E3A5F]/70">✍️ 中文翻译参考</p>
                        {article.translation}
                      </div>
                    )}
                  </div>
                ) : (
                  /* 错词本 */
                  <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-[#E6E1D6]">
                    <div className="flex justify-between items-center mb-6">
                      <div>
                        <h2 className="text-xl font-bold text-[#1E3A5F]">本地个人弱点词库</h2>
                        <p className="text-xs text-[#5A6B84] mt-1">系统已精确到具体汉字拼音进行智能捕捉。</p>
                      </div>
                      <div className="text-right">
                        <span className="text-xs text-[#5A6B84]">累计总阅读量</span>
                        <p className="text-lg font-bold font-mono text-[#1E3A5F]">{userData.totalChars} 字</p>
                      </div>
                    </div>

                    {userData.mistakeWords.length === 0 ? (
                      <div className="text-center py-16 border-2 border-dashed border-[#E6E1D6] rounded-xl text-[#5A6B84]">🌲 完美！目前还没有错词记录。</div>
                    ) : (
                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm border-collapse">
                          <thead>
                            <tr className="border-b border-[#E6E1D6] text-[#5A6B84] text-xs uppercase">
                              <th className="py-3 px-4">汉字</th>
                              <th className="py-3 px-4">标准读音</th>
                              <th className="py-3 px-4">对应释义</th>
                              <th className="py-3 px-4 text-center">错击频次</th>
                              <th className="py-3 px-4 text-right">专项突击</th>
                            </tr>
                          </thead>
                          <tbody>
                            {userData.mistakeWords.sort((a, b) => b.count - a.count).map((word, i) => (
                              <tr key={i} className="border-b border-[#F8F6F1] hover:bg-[#F8F6F1]/50 transition-colors">
                                <td className="py-3 px-4 font-bold text-[#1E3A5F] text-base">{word.kanji}</td>
                                <td className="py-3 px-4 text-[#5A6B84] font-mono">{word.kana}</td>
                                <td className="py-3 px-4 text-xs text-gray-600">{word.meaning}</td>
                                <td className="py-3 px-4 text-center"><span className="px-2 py-0.5 bg-[#C65D5D]/10 text-[#C65D5D] rounded-full text-xs font-bold font-mono">{word.count} 次</span></td>
                                <td className="py-3 px-4 text-right"><button onClick={() => startMistakeReview(word)} className="text-xs bg-[#1E3A5F] text-white px-3 py-1 rounded hover:bg-[#1E3A5F]/90 transition-all">强化消灭</button></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                )}
              </main>
              <footer className="max-w-4xl mx-auto text-center py-8 text-xs text-[#5A6B84]/50 border-t border-[#E6E1D6]/40 mt-12">去中心化无痕学习模式 • 打对才跳字光标系统已激活</footer>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<JapaneseTypingTrainer />);
    </script>
</body>
</html>
