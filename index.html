        function parseUserCustomText(rawText) {
          const text = rawText.trim() || "新しい本を読みました。";
          const elements = [];
          const kanjiRegex = /[\u4e00-\u9faf]+/g;
          let lastIndex = 0;
          let match;

          while ((match = kanjiRegex.exec(text)) !== null) {
            const matchIndex = match.index;
            if (matchIndex > lastIndex) {
              const kanaChunk = text.substring(lastIndex, matchIndex);
              kanaChunk.split("").forEach(char => {
                elements.push({ text: char, kana: char, isKanji: false });
              });
            }

            const kanjiText = match[0];
            let detectedKana = "かんじ"; 
            let aiAnalysis = { type: "自主分析字词", color: "bg-zinc-100 text-zinc-800", meaning: "通用汉字词汇", grammar: "系统已自动为您拆解该汉字并挂载高保真注音，点击可辅助分词精读。" };

            if (kanjiText.includes("新")) { detectedKana = "あたら"; aiAnalysis = { type: "イ形容词 / 基础", color: "bg-emerald-100 text-emerald-800", meaning: "崭新的、新颖的", grammar: "常用于事物性质的描述。" }; }
            else if (kanjiText.includes("本")) { detectedKana = "ほん"; aiAnalysis = { type: "名词 / 书籍", color: "bg-blue-100 text-blue-800", meaning: "书、书籍", grammar: "基础核心词汇。" }; }
            else if (kanjiText.includes("私")) { detectedKana = "わたし"; aiAnalysis = { type: "代词 / 人称", color: "bg-purple-100 text-purple-800", meaning: "我", grammar: "日本社会最通用的日常第一人称。" }; }

            elements.push({ text: kanjiText, kana: detectedKana, isKanji: true, hasAnalysis: true, analysis: aiAnalysis });
            lastIndex = kanjiRegex.lastIndex;
          }

          if (lastIndex < text.length) {
            text.substring(lastIndex).split("").forEach(char => {
              elements.push({ text: char, kana: char, isKanji: false });
            });
          }

          return {
            id: `user_custom_${Date.now()}`,
            title: "您的私人注入解析段落 (字数: " + text.length + "字)",
            source: "用户自选私有数据轨道",
            translation: "自定义长文分析模式已启动。系统已优先执行物理分词与安全注音，您可以直接点击带下划线的汉字进行精读学习。",
            elements: elements
          };
        }

          const [isCustomModeActive, setIsCustomModeActive] = React.useState(false);

          const [isPlaying, setIsPlaying] = React.useState(false);
          const [currentReadingCharIdx, setCurrentReadingCharIdx] = React.useState(-1);
          const synthRef = React.useRef(window.speechSynthesis);
          const utteranceRef = React.useRef(null);

          // 核心重写：安全切换器，防止空对象引发React崩溃白屏
          const fetchRandomOnlineArticle = (level, lengthType) => {
            handleStopSpeech(); 
            setIsCustomModeActive(false);
            setCurrentLevel(level);
            setCurrentLengthType(lengthType);

            const pool = ONLINE_NEWS_POOL[level] && ONLINE_NEWS_POOL[level][lengthType];
            
            if (!pool || pool.length === 0) {
              alert(`当前网络库中 ${level} 级暂无此篇幅规格，已为您自动适配已有精选段落。`);
              // 安全降级：寻找任何一个有数据的分类
              const availableKey = ["SHORT", "MEDIUM", "LONG"].find(k => ONLINE_NEWS_POOL[level][k] && ONLINE_NEWS_POOL[level][k].length > 0);
              if (availableKey) {
                setArticle(ONLINE_NEWS_POOL[level][availableKey][0]);
                setCurrentLengthType(availableKey);
              }
            } else {
              const randomIndex = Math.floor(Math.random() * pool.length);
              setArticle(pool[randomIndex]);
            }
            setActiveAnalysisIdx(null);
          };

          const handleInjectUserText = () => {
            if (!userTextDraft.trim()) {
              alert("请输入或粘贴一段您遇到不懂的日语文章！");
              return;
            }
            handleStopSpeech();
            setIsCustomModeActive(true);
            setCurrentLevel("用户注入");
            setCurrentLengthType("自定义");
            
            const processedArticle = parseUserCustomText(userTextDraft);
            setArticle(processedArticle);
            setActiveAnalysisIdx(null);
            setUserTextDraft(""); 
          };

          // ==========================================
          // 🔥 精准优化的 AI 语音控制核心引擎
          // ==========================================
          const handlePlaySpeech = () => {
            if (!synthRef.current) {
              alert("当前设备环境不支持 Web Speech API。推荐使用 iPad Safari 浏览器。");
              return;
            }

            if (isPlaying) {
              handleStopSpeech();
              return;
            }

            // 1. 语流平滑：拼接文本，消除没有空格时产生的机器人结巴停顿
            const textToSpeak = article.elements.map(el => el.text).join("");
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'ja-JP'; 
            
            // 2. 语气调优：语速最适位 0.88x，调高音调 1.05，让发音更有灵动感和呼吸感
            utterance.rate = 0.88;
            utterance.pitch = 1.05; 

            // 3. 筛选最顶级原生声线（优先 iOS Kyoko 声线）
            const voices = synthRef.current.getVoices();
            const premiumVoice = voices.find(v => (v.lang.includes('ja-JP') || v.lang.includes('ja_JP')) && (v.name.includes('Premium') || v.name.includes('Enhanced') || v.name.includes('Kyoko'))) 
                                 || voices.find(v => v.lang.includes('ja-JP'));
            
            if (premiumVoice) {
              utterance.voice = premiumVoice;
            }

            // 4. 卡拉OK逐字高亮平滑检测
            let lastCharIndex = -1;
            utterance.onboundary = (event) => {
              if (event.name === 'word' || event.name === 'char') {
                const currentIndex = event.charIndex;
                if (currentIndex !== lastCharIndex) {
                  lastCharIndex = currentIndex;
                  setCurrentReadingCharIdx(currentIndex);
                }
              }
            };

            utterance.onend = () => { setIsPlaying(false); setCurrentReadingCharIdx(-1); };
            utterance.onerror = () => { setIsPlaying(false); setCurrentReadingCharIdx(-1); };

            utteranceRef.current = utterance;
            setIsPlaying(true);
            
            // 5. 强刷底层硬件缓存，规避 iPad 连续点触造成的紊乱
            synthRef.current.cancel();
            setTimeout(() => {
              synthRef.current.speak(utterance);
            }, 50); 
          };

          const handleStopSpeech = () => {
            if (synthRef.current) synthRef.current.cancel();
            setIsPlaying(false);
            setCurrentReadingCharIdx(-1);
          };

          React.useEffect(() => {
            return () => { if (synthRef.current) synthRef.current.cancel(); };
          }, []);

          const getHighlightClass = (el, elIdx) => {
            if (!isPlaying || currentReadingCharIdx === -1) return "";
            let cumulativeLength = 0;
            for (let i = 0; i < elIdx; i++) {
              cumulativeLength += article.elements[i].text.length;
            }
            const elLength = el.text.length;
            if (currentReadingCharIdx >= cumulativeLength - 1 && currentReadingCharIdx <= cumulativeLength + elLength + 1) {
              return "speech-reading-highlight";
            }
            return "";
          };

          return (
            <div className="min-h-screen flex flex-col justify-between" onClick={() => handleStopSpeech}>
              
              {/* 顶部控制中枢 */}
              <header className="bg-white border-b border-zinc-200 px-6 py-4 sticky top-0 z-50 shadow-sm">
                <div className="max-w-6xl mx-auto flex flex-col xl:flex-row justify-between items-center gap-4">
                  
                  <div className="flex items-center space-x-3 w-full xl:w-auto justify-between xl:justify-start">
                    <div className="flex items-center space-x-2">
                      <span className="text-xl font-black tracking-tight text-zinc-900">日本語<span className="text-blue-600">双轨精读本</span></span>
                      <span className="text-xs font-mono px-2 py-0.5 bg-zinc-900 text-white rounded font-bold">V3.1 极稳版</span>
                    </div>
                    <button 
                      onClick={() => setShowTranslation(!showTranslation)} 
                      className="text-xs bg-zinc-100 hover:bg-zinc-200 text-zinc-600 px-2.5 py-1 rounded border border-zinc-200 xl:hidden"
                    >
                      {showTranslation ? "👁 隐藏译文" : "👁 显示译文"}
                    </button>
                  </div>

                  {/* 等级选择器 */}
                  <div className="flex flex-wrap items-center bg-zinc-100 border border-zinc-200 rounded-xl p-1 gap-1 text-xs w-full xl:w-auto">
                    <span className="text-zinc-500 px-2 font-bold text-[11px] tracking-wider">🎯 能力层级:</span>
                    {["N5", "N3", "N2"].map((lvl) => (
                      <button 
                        key={lvl} 
                        onClick={() => fetchRandomOnlineArticle(lvl, currentLengthType)} 
                        className={`px-3 py-1.5 rounded-lg font-bold transition-all ${(!isCustomModeActive && currentLevel === lvl) ? "bg-blue-600 text-white shadow-sm" : "text-zinc-600 hover:bg-zinc-200"}`}
                      >
                        {lvl === "N5" ? "N5 基础圈" : lvl === "N3" ? "N3 进阶圈" : "N2/N1 新闻圈"}
                      </button>
                    ))}
                  </div>

                  {/* 篇幅字数过滤器 */}
                  <div className="flex flex-wrap items-center bg-amber-50 border border-amber-200 rounded-xl p-1 gap-1 text-xs w-full xl:w-auto">
                    <span className="text-amber-700 px-2 font-bold text-[11px] tracking-wider">📏 篇幅字数分段:</span>
                    {[
                      { key: "SHORT", name: "短篇 (50-200字)" },
                      { key: "MEDIUM", name: "中篇 (200-500字)" },
                      { key: "LONG", name: "长篇 (500-1000字)" }
                    ].map((len) => (
                      <button 
                        key={len.key} 
                        onClick={() => fetchRandomOnlineArticle(isCustomModeActive ? "N3" : currentLevel, len.key)} 
                        className={`px-2.5 py-1.5 rounded-lg font-bold transition-all ${(!isCustomModeActive && currentLengthType === len.key) ? "bg-amber-600 text-white shadow-sm" : "text-amber-800 hover:bg-amber-100"}`}
                      >
                        {len.name}
                      </button>
                    ))}
                  </div>

                  <button 
                    onClick={() => setShowTranslation(!showTranslation)} 
                    className={`hidden xl:block text-xs px-3 py-1.5 rounded-lg border font-medium transition-all ${showTranslation ? "bg-white border-zinc-200 text-zinc-700" : "bg-zinc-200 border-zinc-300 text-zinc-500"}`}
                  >
                    {showTranslation ? "隐藏对照中文译文" : "显示完整中文译文"}
                  </button>
                </div>
              </header>

              {/* 核心展示画布 */}
              <main className="flex-grow max-w-5xl w-full mx-auto px-4 py-6 flex flex-col justify-start gap-4">
                
                {/* 轨道 B：私人长文输入舱 */}
                <div className="bg-white border border-blue-100 rounded-2xl p-4 shadow-sm">
                  <div className="text-xs font-bold text-blue-900 mb-2">📥 轨道B：粘贴您在别的网站遇到不懂的任何字数长短文</div>
                  <div className="flex gap-2">
                    <input 
                      type="text"
                      value={userTextDraft}
                      onChange={(e) => setUserTextDraft(e.target.value)}
                      placeholder="在这里粘贴任意日文长句或段落，系统会自动切段注音并发音..."
                      className="flex-grow text-xs font-mono bg-zinc-50 border border-zinc-200 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-zinc-800"
                    />
                    <button 
                      onClick={handleInjectUserText}
                      className="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-4 rounded-xl transition-colors whitespace-nowrap"
                    >
                      AI 自主切段分析 ⚡
                    </button>
                  </div>
                </div>

                {/* 精准来源高亮标注 */}
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center text-xs text-zinc-400 font-mono px-1 gap-1">
                  <div>🎯 当前文章截取来源: <span className="font-bold text-zinc-700 bg-zinc-200 px-2 py-0.5 rounded">{article?.source || "未知源"}</span></div>
                  <div className="text-zinc-500">
                    当前规格: <span className="text-amber-600 font-bold">{currentLengthType}</span> 段落 • 点击下划线汉字查看词性标签
                  </div>
                </div>

                {/* 综合大标题与 AI 朗读大控制台 */}
                <div className="bg-white border border-zinc-200 p-4 rounded-2xl shadow-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                  <div className="flex items-center space-x-2">
                    <span className={`px-2 py-0.5 text-[10px] font-black rounded ${isCustomModeActive ? "bg-purple-600 text-white" : "bg-blue-600 text-white"}`}>
                      {currentLevel}
                    </span>
                    <h2 className="text-base font-bold text-zinc-900 line-clamp-1">{article?.title || "未载入文章"}</h2>
                  </div>
                  
                  <button 
                    onClick={handlePlaySpeech}
                    className={`w-full sm:w-auto px-5 py-2.5 rounded-xl font-bold text-xs shadow-sm flex items-center justify-center space-x-2 border transition-all ${isPlaying ? "bg-red-500 text-white border-red-600 animate-pulse" : "bg-emerald-600 text-white border-emerald-700 hover:bg-emerald-700"}`}
                  >
                    <span>{isPlaying ? "⏹ 停止播放当前段落" : "🔊 启动 AI 流畅阅读 (0.88x 听读高亮)"}</span>
                  </button>
                </div>

                {/* 最终纸张：顶置注音排版 */}
                <div className="bg-white rounded-2xl border border-zinc-200 shadow-md p-8 md:p-12 leading-relaxed tracking-widest select-none min-h-[220px] flex items-center">
                  <div className="text-2xl md:text-3xl font-normal text-zinc-800 flex flex-wrap items-end gap-y-16 gap-x-1.5 w-full">
                    {article && article.elements ? article.elements.map((el, idx) => {
                      const isClickable = el.hasAnalysis;
                      const isReadingStyle = getHighlightClass(el, idx);
                      const activeAnalysisStyle = activeAnalysisIdx === idx ? "text-blue-600 bg-blue-50/80 rounded" : "";

                      return (
                        <span 
                          key={idx}
                          onClick={() => isClickable && setActiveAnalysisIdx(activeAnalysisIdx === idx ? null : idx)}
                          className={`${isClickable ? "grammar-word" : ""} ${isReadingStyle} ${activeAnalysisStyle} inline-block p-0.5 transition-all duration-150`}
                        >
                          <ruby>
                            <span>{el.text}</span>
                            {el.isKanji ? (
                              <rt>{el.kana}</rt>
                            ) : (
                              <rt className="opacity-0 select-none pointer-events-none">.</rt>
                            )}
                          </ruby>
                        </span>
                      );
                    }) : <p className="text-xs text-zinc-400">暂无可以渲染的正文数据</p>}
                  </div>
                </div>

                {/* 隐藏式 AI 单词文法精读解析卡片 */}
                {activeAnalysisIdx !== null && article && article.elements && article.elements[activeAnalysisIdx] && (
                  <div className="analysis-card bg-gradient-to-r from-blue-50/70 to-indigo-50/70 border border-blue-200/80 rounded-2xl p-5 shadow-sm">
                    <div className="flex justify-between items-start border-b border-blue-200/50 pb-2 mb-3">
                      <div className="flex items-center space-x-3">
                        <h3 className="text-sm font-black text-blue-900">
                          AI 智能精读分词: 【{article.elements[activeAnalysisIdx].text}】
                        </h3>
                        <span className={`text-[11px] font-bold px-2 py-0.5 rounded font-mono shadow-sm ${article.elements[activeAnalysisIdx].analysis.color || "bg-zinc-100 text-zinc-700"}`}>
                          🏷 {article.elements[activeAnalysisIdx].analysis.type}
                        </span>
                      </div>
                      <button onClick={() => setActiveAnalysisIdx(null)} className="text-xs text-blue-500 hover:text-blue-700 font-bold">✕ 收起</button>
                    </div>
                    
                    <div className="space-y-3">
                      <div>
                        <strong className="text-zinc-400 text-[11px] uppercase tracking-wider block mb-0.5">中文精准核心释义:</strong>
                        <p className="font-bold text-sm text-zinc-900">{article.elements[activeAnalysisIdx].analysis.meaning}</p>
                      </div>
                      <div className="text-xs text-zinc-700 leading-relaxed bg-white/90 p-3 rounded-xl border border-blue-100/60 shadow-inner">
                        <strong className="text-blue-900 font-bold block mb-1">💡 核心语用场境与难点解析:</strong>
                        {article.elements[activeAnalysisIdx].analysis.grammar}
                      </div>
                    </div>
                  </div>
                )}

                {/* 底部中文全量翻译对照 */}
                {showTranslation && article && (
                  <div className="bg-zinc-800 text-zinc-200 p-5 rounded-2xl border border-zinc-700 shadow-inner text-xs leading-relaxed transition-all">
                    <strong className="block text-[11px] font-mono uppercase tracking-widest text-zinc-400 mb-1.5">🇨🇳 完整全量中文对照翻译参考：</strong>
                    {article.translation}
                  </div>
                )}

              </main>

              <footer className="text-center py-6 text-[11px] text-zinc-400 border-t border-zinc-200 bg-white font-mono">
                Ultimate Jp Reader Core V3.1 • 复合防白屏底层保障架构
              </footer>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<JpUltimateReaderApp />);
    </script>
</body>
</html>
